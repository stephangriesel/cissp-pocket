<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>CISSP Pocket Trainer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2a2f45;
  --text:#e8eaf0;--muted:#6b7394;--d1:#f7945d;--d2:#9b8cf0;--d3:#5ec8c4;--d4:#f7945d;--d5:#4f8ef7;--d6:#e85d75;--d7:#7fb069;--d8:#c9a227;
  --correct:#3dba7a;--wrong:#e85d75;--accent:#f7c34f;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.nav-title{font-size:15px;font-weight:600;letter-spacing:0.3px}
.nav-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}
.badge-d1{background:rgba(255,255,255,0.06);color:var(--d1)}.badge-d2{background:rgba(255,255,255,0.06);color:var(--d2)}.badge-d3{background:rgba(255,255,255,0.06);color:var(--d3)}.badge-d4{background:rgba(255,255,255,0.06);color:var(--d4)}.badge-d5{background:rgba(255,255,255,0.06);color:var(--d5)}.badge-d6{background:rgba(255,255,255,0.06);color:var(--d6)}.badge-d7{background:rgba(255,255,255,0.06);color:var(--d7)}.badge-d8{background:rgba(255,255,255,0.06);color:var(--d8)}.badge-all{background:var(--surface2);color:var(--muted)}
.tabs{display:grid;grid-template-columns:1fr 1fr;margin:16px 16px 0;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.tab{padding:11px;text-align:center;font-size:13px;font-weight:600;background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.2s}
.tab.active{background:var(--surface2);color:var(--text)}
.filter-row{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.filter-row::-webkit-scrollbar{display:none}
.filter-btn{flex:0 0 auto;white-space:nowrap;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s}
.filter-btn.active-d1{background:rgba(255,255,255,0.08);color:var(--d1);border-color:var(--d1)}.filter-btn.active-d2{background:rgba(255,255,255,0.08);color:var(--d2);border-color:var(--d2)}.filter-btn.active-d3{background:rgba(255,255,255,0.08);color:var(--d3);border-color:var(--d3)}.filter-btn.active-d4{background:rgba(255,255,255,0.08);color:var(--d4);border-color:var(--d4)}.filter-btn.active-d5{background:rgba(255,255,255,0.08);color:var(--d5);border-color:var(--d5)}.filter-btn.active-d6{background:rgba(255,255,255,0.08);color:var(--d6);border-color:var(--d6)}.filter-btn.active-d7{background:rgba(255,255,255,0.08);color:var(--d7);border-color:var(--d7)}.filter-btn.active-d8{background:rgba(255,255,255,0.08);color:var(--d8);border-color:var(--d8)}
.filter-btn.active-all{background:var(--surface2);color:var(--text);border-color:var(--muted)}
.progress-bar{height:3px;background:var(--border);margin:0 16px}
.progress-fill{height:3px;background:var(--accent);transition:width 0.4s ease;border-radius:2px}
.progress-label{font-size:11px;color:var(--muted);padding:6px 16px 0;text-align:right}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--text)}.stat-label{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.stat-num.green{color:var(--correct)}.stat-num.red{color:var(--wrong)}
.card-area{flex:1;padding:0 16px 24px;display:flex;flex-direction:column;gap:12px}
.flashcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 20px;min-height:190px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;position:relative;transition:border-color 0.2s}
.flashcard:active{opacity:0.9}
.card-domain{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.card-domain.d1{color:var(--d1)}.card-domain.d2{color:var(--d2)}.card-domain.d3{color:var(--d3)}.card-domain.d4{color:var(--d4)}.card-domain.d5{color:var(--d5)}.card-domain.d6{color:var(--d6)}.card-domain.d7{color:var(--d7)}.card-domain.d8{color:var(--d8)}
.card-label{font-size:10px;color:var(--muted);letter-spacing:0.5px;margin-bottom:8px;text-transform:uppercase}
.card-text{font-size:15px;line-height:1.6;color:var(--text)}
.card-back{display:none}
.flashcard.flipped .card-front{display:none}
.flashcard.flipped .card-back{display:block}
.flashcard.flipped{border-color:var(--accent)}
.flip-hint{font-size:11px;color:var(--muted);text-align:center}
.rating-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rating-btn{padding:13px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer}
.rating-btn:active{opacity:0.85}
.btn-got-it{background:#1a3d2d;color:var(--correct);border:1px solid var(--correct)}
.btn-again{background:#3d1a24;color:var(--wrong);border:1px solid var(--wrong)}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.q-domain{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.q-domain.d1{color:var(--d1)}.q-domain.d2{color:var(--d2)}.q-domain.d3{color:var(--d3)}.q-domain.d4{color:var(--d4)}.q-domain.d5{color:var(--d5)}.q-domain.d6{color:var(--d6)}.q-domain.d7{color:var(--d7)}.q-domain.d8{color:var(--d8)}
.q-text{font-size:15px;line-height:1.55;margin-bottom:18px;color:var(--text)}
.q-options{display:flex;flex-direction:column;gap:8px}
.q-option{padding:13px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);font-size:13px;color:var(--text);cursor:pointer;text-align:left;line-height:1.4;transition:all 0.15s;width:100%}
.q-option.correct{background:#1a3d2d;border-color:var(--correct);color:var(--correct)}
.q-option.wrong{background:#3d1a24;border-color:var(--wrong);color:var(--wrong)}
.q-explanation{margin-top:14px;padding:14px;background:var(--surface2);border-radius:10px;font-size:13px;color:var(--muted);line-height:1.55;border-left:3px solid var(--accent)}
.q-next{width:100%;padding:14px;background:var(--accent);color:#0f1117;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.session-end{text-align:center;padding:40px 20px}
.end-icon{font-size:48px;margin-bottom:16px}
.end-title{font-size:20px;font-weight:700;margin-bottom:8px}
.end-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.restart-btn{padding:15px 32px;background:var(--accent);color:#0f1117;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
#pwaBar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--border);padding:14px 16px;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,0.4)}
#pwaBar.visible{display:flex}
.pwa-icon{width:40px;height:40px;border-radius:10px;background:#0f1117;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pwa-icon svg{width:24px;height:24px}
.pwa-text{flex:1;min-width:0}
.pwa-title{font-size:13px;font-weight:700;color:var(--text)}
.pwa-sub{font-size:11px;color:var(--muted);margin-top:1px}
.pwa-install{padding:9px 16px;background:var(--accent);color:#0f1117;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.pwa-dismiss{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1}
#authOverlay{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.auth-box{width:100%;max-width:340px;text-align:center}
.auth-title{font-size:22px;font-weight:700;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.5}
.auth-input{width:100%;padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;margin-bottom:12px;outline:none;-webkit-appearance:none}
.auth-input:focus{border-color:var(--accent)}
.auth-btn{width:100%;padding:14px;background:var(--accent);color:#0f1117;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.auth-error{font-size:13px;color:var(--wrong);margin-top:10px;min-height:18px}
</style>
</head>
<body>
<div id="authOverlay">
  <div class="auth-box">
    <div class="auth-title">CISSP Pocket Trainer</div>
    <div class="auth-sub">Enter your access password to continue.</div>
    <input class="auth-input" type="password" id="authInput" placeholder="Password" onkeydown="if(event.key==='Enter')submitPassword()">
    <button class="auth-btn" onclick="submitPassword()">Unlock</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>
<div id="pwaBar">
  <div class="pwa-icon">
    <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" rx="96" fill="#0f1117"/><text x="256" y="350" font-family="system-ui,sans-serif" font-size="260" font-weight="700" fill="#f7c34f" text-anchor="middle">C</text></svg>
  </div>
  <div class="pwa-text">
    <div class="pwa-title">CISSP Pocket Trainer</div>
    <div class="pwa-sub">Add to Home Screen for offline access</div>
  </div>
  <button class="pwa-install" onclick="installPWA()">Install</button>
  <button class="pwa-dismiss" onclick="dismissPWA()" aria-label="Dismiss">×</button>
</div>
<nav>
  <div class="nav-title">CISSP Pocket Trainer</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="syncBadge" style="font-size:10px;color:var(--muted)">● syncing…</span>
    <div id="navBadge" class="nav-badge badge-all">All Domains</div>
    <button onclick="confirmNewSession()" style="font-size:10px;padding:5px 9px;border-radius:14px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-weight:600;cursor:pointer">New session</button>
  </div>
</nav>
<div id="timeBar" style="display:flex;justify-content:center;padding:8px 16px 0;font-size:11px;color:var(--muted);letter-spacing:0.3px">
  Total study time: <span id="totalTimeLabel" style="color:var(--accent);font-weight:700;margin-left:4px">0h 0m</span>
</div>
<div class="tabs">
  <div class="tab active" id="tabFlash" onclick="switchMode('flash')">Flashcards</div>
  <div class="tab" id="tabQuiz" onclick="switchMode('quiz')">Quiz</div>
</div>
<div class="filter-row">
  <button class="filter-btn active-all" id="filterAll" onclick="setDomain('all')">All</button>
  <button class="filter-btn" id="filterD1" onclick="setDomain('D1')">D1 — Sec & Risk</button>
  <button class="filter-btn" id="filterD2" onclick="setDomain('D2')">D2 — Asset Sec</button>
  <button class="filter-btn" id="filterD3" onclick="setDomain('D3')">D3 — Sec Arch</button>
  <button class="filter-btn" id="filterD4" onclick="setDomain('D4')">D4 — Comms & Net</button>
  <button class="filter-btn" id="filterD5" onclick="setDomain('D5')">D5 — IAM</button>
  <button class="filter-btn" id="filterD6" onclick="setDomain('D6')">D6 — Assess</button>
  <button class="filter-btn" id="filterD7" onclick="setDomain('D7')">D7 — Sec Ops</button>
  <button class="filter-btn" id="filterD8" onclick="setDomain('D8')">D8 — SW Dev</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="progress-label" id="progressLabel">0 / 0</div>
<div class="stats-row">
  <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Cards</div></div>
  <div class="stat-card"><div class="stat-num green" id="statGot">0</div><div class="stat-label">Got it</div></div>
  <div class="stat-card" id="statAgainCard" onclick="showReviewList()" style="cursor:pointer"><div class="stat-num red" id="statAgain">0</div><div class="stat-label">Again (tap to review)</div></div>
</div>
<div class="card-area" id="cardArea"></div>
<script>
const DATA={"flashcards":[{"id":"d5_fc_001","domain":"D5","front":"What does IAAA stand for?","back":"Identification, Authentication, Authorization, and Accountability \u2014 the four pillars of access management."},{"id":"d5_fc_002","domain":"D5","front":"What is Type 1 Authentication?","back":"Something you know \u2014 passwords, passphrases, PINs. Also called knowledge factors. It is the weakest form of authentication."},{"id":"d5_fc_003","domain":"D5","front":"What is Type 2 Authentication?","back":"Something you have \u2014 ID, passport, smart card, token, cookie. Also called possession factors."},{"id":"d5_fc_004","domain":"D5","front":"What is Type 3 Authentication?","back":"Something you are \u2014 biometrics such as fingerprint, iris scan, facial geometry. Also called realistic authentication."},{"id":"d5_fc_005","domain":"D5","front":"Does username + password qualify as multi-factor authentication?","back":"No. Both are 'something you know' (Type 1). MFA requires factors from two or more DIFFERENT categories."},{"id":"d5_fc_006","domain":"D5","front":"What is Key Stretching?","back":"Adding 1\u20132 seconds to password verification to make brute force attacks unfeasible by requiring millions of slow attempts."},{"id":"d5_fc_007","domain":"D5","front":"What is a Salt in password security?","back":"Random data added as input to a one-way hash function. Defends against dictionary attacks and pre-compiled rainbow table attacks."},{"id":"d5_fc_008","domain":"D5","front":"What is a Nonce?","back":"An arbitrary number used only once in an authentication protocol to prevent replay attacks. Also useful as initialization vectors."},{"id":"d5_fc_009","domain":"D5","front":"What are Clipping Levels?","back":"Thresholds that allow a few failed login attempts before locking an account, preventing brute force while not over-burdening admins."},{"id":"d5_fc_010","domain":"D5","front":"What is FRR in biometrics?","back":"False Rejection Rate \u2014 Type 1 error. Authorized users are incorrectly rejected. Caused by overly strict sensitivity settings."},{"id":"d5_fc_011","domain":"D5","front":"What is FAR in biometrics?","back":"False Acceptance Rate \u2014 Type 2 error. Unauthorized users are incorrectly granted access. This is the more serious error."},{"id":"d5_fc_012","domain":"D5","front":"What is the CER in biometrics?","back":"Crossover Error Rate \u2014 the point where FRR and FAR are equal. The optimal balance point for biometric sensitivity settings."},{"id":"d5_fc_013","domain":"D5","front":"Which access control model prioritizes Confidentiality?","back":"MAC (Mandatory Access Control) \u2014 uses labels and clearances. Commonly used in military environments."},{"id":"d5_fc_014","domain":"D5","front":"Which access control model prioritizes Availability?","back":"DAC (Discretionary Access Control) \u2014 owner assigns access at their discretion. Uses DACLs. Most OS's use this."},{"id":"d5_fc_015","domain":"D5","front":"Which access control model prioritizes Integrity?","back":"RBAC (Role-Based Access Control) \u2014 access based on roles/permissions groups. Most commonly used in private organizations."},{"id":"d5_fc_016","domain":"D5","front":"What is ABAC?","back":"Attribute-Based Access Control \u2014 grants access based on subject attributes (role, clearance), object attributes (name, owner), AND environmental conditions (location, time). Also called PBAC or CBAC."},{"id":"d5_fc_017","domain":"D5","front":"What is the difference between Context-Based and Content-Based access control?","back":"Context-Based: access controlled by contextual parameters (location, time, access history). Content-Based: access controlled by the attributes or content of the object being accessed."},{"id":"d5_fc_018","domain":"D5","front":"What is HOTP?","back":"HMAC-based One-Time Password \u2014 uses a shared secret and an incremental counter. Generates a code when asked; valid until used."},{"id":"d5_fc_019","domain":"D5","front":"What is TOTP?","back":"Time-based One-Time Password \u2014 uses a shared secret and time. Codes generated every 30 or 60 seconds. Synchronized clocks are critical."},{"id":"d5_fc_020","domain":"D5","front":"What is the difference between RADIUS and TACACS+?","back":"RADIUS only encrypts the password. TACACS+ encrypts the ENTIRE data package. TACACS+ uses TCP port 49; RADIUS uses UDP 1812 (auth) and 1813 (accounting)."},{"id":"d5_fc_021","domain":"D5","front":"What is Kerberos and what port does it use?","back":"A ticket-based authentication protocol providing mutual authentication over non-secure networks. Uses symmetric keys. UDP port 88. Used in Active Directory."},{"id":"d5_fc_022","domain":"D5","front":"What is Kerberos' main weakness?","back":"Single point of failure \u2014 if the KDC is compromised, the attacker gains access to everything that user can access."},{"id":"d5_fc_023","domain":"D5","front":"What is SESAME?","back":"Successor to Kerberos. Uses PKI (asymmetric) encryption instead of symmetric keys. Issues PACs via a PAS instead of tickets. Not widely used."},{"id":"d5_fc_024","domain":"D5","front":"What is the difference between SSO and Super Sign-On?","back":"SSO: one login for multiple systems within an organization. Super Sign-On: one login (e.g. social media account) grants access to many external sites/systems."},{"id":"d5_fc_025","domain":"D5","front":"What is SAML used for?","back":"Security Assertion Markup Language \u2014 XML-based standard for exchanging authentication and authorization data. Primary use: web browser SSO."},{"id":"d5_fc_026","domain":"D5","front":"What is JIT Provisioning?","back":"Just-In-Time Provisioning \u2014 on first visit to a third-party site, the JIT system verifies the employee and creates their account automatically, most commonly using SAML."},{"id":"d5_fc_027","domain":"D5","front":"What is OpenID Connect (OIDC)?","back":"Adds an identity layer to OAuth 2.0, allowing third-party apps to verify user identity. Enables logging into thousands of sites with a Google or Facebook account."},{"id":"d5_fc_028","domain":"D5","front":"What is the Policy Decision Point (PDP)?","back":"The function that evaluates policies and decides whether access should be granted. Centralizes decision-making for consistent policy application."},{"id":"d5_fc_029","domain":"D5","front":"What is the Policy Enforcement Point (PEP)?","back":"The function that enforces the PDP's decisions. Sits at the point of access (network gateway, database) and blocks non-compliant requests."},{"id":"d5_fc_030","domain":"D5","front":"Why are group/shared accounts never acceptable?","back":"They have zero accountability \u2014 you cannot trace an action to a specific individual, which breaks the 'A' in IAAA."},{"id":"d5_fc_031","domain":"D5","front":"What is Privilege/Authorization Creep?","back":"When users accumulate permissions over time (e.g. after transfers) without revoking old access. RBAC with proper role transitions prevents this."},{"id":"d5_fc_032","domain":"D5","front":"What is IDaaS?","back":"Identity as a Service \u2014 IAM built, hosted, and managed by a third-party cloud provider. Can provide SSO, FIDM, and password management."},{"id":"d5_fc_033","domain":"D5","front":"What is CHAP and how does it work?","back":"Challenge-Handshake Authentication Protocol \u2014 uses a three-way handshake. Shared secret never sent over network. Protects against replay attacks. Used by PPP servers."},{"id":"d5_fc_034","domain":"D5","front":"What is PAP and why is it insecure?","back":"Password Authentication Protocol \u2014 sends credentials in plaintext at the start of the connection. One of the oldest protocols; no longer considered secure."},{"id":"d5_fc_035","domain":"D5","front":"What is the minimum recommended password length per DoD/Microsoft guidelines?","back":"14 characters minimum. History: 24 passwords remembered. Max age: 90 days. Min age: 2 days. Never store using reversible encryption."},{"id":"d6_fc_001","domain":"D6","front":"What is the difference between a Security Assessment and a Security Audit?","back":"Assessment: broad scope, full picture of control effectiveness \u2014 can include pen tests, vuln assessments, policy review. Audit: a test against a PUBLISHED STANDARD (e.g. SOC2, PCI-DSS, HIPAA)."},{"id":"d6_fc_002","domain":"D6","front":"What are the three types of audits?","back":"Unstructured (internal): internal auditors find flaws before external audit. External: outside company audits controls. Structured/3rd Party: validates compliance for a regulatory body."},{"id":"d6_fc_003","domain":"D6","front":"What is SOC 1?","back":"Focuses on controls relevant to financial reporting. For internal use. Type I: design effectiveness at a single point in time. Type II: design AND operating effectiveness over minimum 6 months."},{"id":"d6_fc_004","domain":"D6","front":"What is SOC 2?","back":"Assesses internal controls for compliance and operations. Must meet AICPA trust service criteria: Security, Availability, Processing Integrity, Confidentiality, Privacy. Type I (point in time) vs Type II (6+ months)."},{"id":"d6_fc_005","domain":"D6","front":"What is SOC 3?","back":"Similar to SOC 2 but generalized and publicly available. Includes only the auditor's opinion and limited control description. Covers the same trust service principles as SOC 2."},{"id":"d6_fc_006","domain":"D6","front":"What type of control is reviewing audit logs?","back":"Primarily a DETECTIVE control \u2014 it identifies that something happened after the fact, rather than preventing it."},{"id":"d6_fc_007","domain":"D6","front":"What are the 5 problems with audit record management?","back":"1) Logs not reviewed regularly. 2) Not stored long enough. 3) Not standardized/viewable by correlation tools. 4) Entries not prioritized. 5) Only reviewed for bad stuff."},{"id":"d6_fc_008","domain":"D6","front":"In cloud auditing, who is ultimately responsible for data protection?","back":"The ORGANIZATION (customer) \u2014 regardless of the cloud provider's fault in case of a breach. The cloud provider does not take on that responsibility."},{"id":"d6_fc_009","domain":"D6","front":"What is the Shared Responsibility Model in cloud auditing?","back":"The cloud provider and customer share security responsibilities, with the split depending on the service model: IaaS (customer does most), PaaS (shared), SaaS (provider does most)."},{"id":"d6_fc_010","domain":"D6","front":"What is Static Testing?","back":"Passively testing code WITHOUT running it \u2014 walkthroughs, syntax checking, code reviews. Looks at raw source code for known insecure practices."},{"id":"d6_fc_011","domain":"D6","front":"What is Dynamic Testing?","back":"Actively testing code WHILE EXECUTING it. Can uncover flaws in the implementation and interaction of code that static analysis misses."},{"id":"d6_fc_012","domain":"D6","front":"What is Fuzzing (Fuzz Testing)?","back":"Black box testing that submits random, malformed data as inputs into software to determine if it crashes or enters an unpredictable state."},{"id":"d6_fc_013","domain":"D6","front":"What is Penetration Testing and who sets the goals?","back":"Authorized simulated attack to find security weaknesses. SENIOR MANAGEMENT sets the goals and must sign off. Pen testers document vulnerabilities \u2014 they do NOT fix them."},{"id":"d6_fc_014","domain":"D6","front":"What is a SOW in the context of pen testing?","back":"Statement of Work \u2014 defines the rules of engagement: IP ranges, time frames, tools, POC, what to test. Must be confirmed with legal team before engaging pen testers."},{"id":"d6_fc_015","domain":"D6","front":"What is Black Box pen testing?","back":"Zero Knowledge \u2014 attacker has no information about the organization other than publicly available data. Simulates an external attacker."},{"id":"d6_fc_016","domain":"D6","front":"What is White Box pen testing?","back":"Full Knowledge (Crystal/Clear Box) \u2014 attacker has full internal network knowledge and access, like a privileged employee or admin. Most comprehensive test."},{"id":"d6_fc_017","domain":"D6","front":"What is Grey Box pen testing?","back":"Partial Knowledge \u2014 attacker has limited knowledge, similar to a normal user, vendor, or someone with basic environment access."},{"id":"d6_fc_018","domain":"D6","front":"What is the pen testing process in order?","back":"Planning > Reconnaissance > Scanning/Enumeration > Vulnerability Assessment > Exploitation > Reporting. (Also: Discovery > Gaining Access > Escalate Privileges > System Browsing > Install Additional Tools > Report)"},{"id":"d6_fc_019","domain":"D6","front":"What is Breach and Attack Simulation (BAS)?","back":"Automated tools that simulate complex cyberattacks continuously (24/7/365) across all attack vectors. Combines red and blue team approaches (purple teaming)."},{"id":"d6_fc_020","domain":"D6","front":"What is the formula for Risk?","back":"Risk = Threat \u00d7 Vulnerability. Vulnerability scanning shows the vulnerability half; pen testing matches vulnerabilities to threats to show actual risk."},{"id":"d6_fc_021","domain":"D6","front":"What is the difference between White Hat, Black Hat, and Grey Hat hackers?","back":"White Hat: professional pen testers/ethical hackers \u2014 find flaws to fix. Black Hat: malicious hackers who exploit flaws (crackers). Grey Hat: somewhere between \u2014 may find flaws but not always with permission."},{"id":"d6_fc_022","domain":"D6","front":"What is Social Engineering?","back":"Using people skills to bypass security controls. Common techniques: Authority, Intimidation, Consensus, Scarcity, Urgency, Familiarity."},{"id":"d6_fc_023","domain":"D6","front":"What is Regression Testing?","back":"Finding defects after a major code change \u2014 looks for software regressions, including old bugs that have come back after a change."},{"id":"d6_fc_024","domain":"D6","front":"What is the Requirements Traceability Matrix (RTM)?","back":"A table that maps customer requirements to the testing plan using a many-to-many relationship. Ensures all requirements are covered in testing."},{"id":"d6_fc_025","domain":"D6","front":"What is Misuse Case Testing?","back":"Executing a malicious act against a system to test it. Attackers don't behave like normal users, so we must test for misuse scenarios."},{"id":"d6_fc_026","domain":"D6","front":"What is Test Coverage Analysis?","back":"Identifies what percentage of the code was tested relative to the entire application. Ensures no significant gaps that could hide bugs or security issues."},{"id":"d6_fc_027","domain":"D6","front":"What is War Driving?","back":"Driving or walking around mapping wireless access points and attempting to gain access to them. Used in wireless penetration testing."},{"id":"d6_fc_028","domain":"D6","front":"What is Ethical Disclosure?","back":"When discovering an unknown vulnerability during testing, the ethical obligation is to: put in compensating controls, notify the vendor, and give them time to patch before public disclosure."},{"id":"d6_fc_029","domain":"D6","front":"What is Unit Testing?","back":"Tests that verify the functionality of a specific section of code. In OOP, usually at the class level. Typically written by developers (white-box)."},{"id":"d6_fc_030","domain":"D6","front":"What is Integration Testing?","back":"Verifies interfaces between components against a software design. Exposes defects in interactions between integrated modules. Tests progressively larger groups of components."},{"id":"d6_fc_031","domain":"D6","front":"What is Synthetic Monitoring?","back":"Building scripts or tools that simulate normal user activity in an application to continuously test and monitor performance and behaviour."},{"id":"d6_fc_032","domain":"D6","front":"What are the AICPA Trust Service Criteria for SOC 2?","back":"Security, Availability, Processing Integrity, Confidentiality, and Privacy \u2014 all five must be addressed in a SOC 2 audit."},{"id":"d6_fc_033","domain":"D6","front":"What is the difference between SOC 2 Type I and Type II?","back":"Type I: tests the SUITABILITY OF DESIGN of controls at a single point in time. Type II: tests design AND OPERATING EFFECTIVENESS over a period (minimum 6 months). Type I = snapshot, Type II = movie."},{"id":"d6_fc_034","domain":"D6","front":"What is Misuse Case Testing and why do we need it?","back":"Testing the system from an ATTACKER's perspective rather than a normal user's. Needed because attackers do not behave like normal users \u2014 standard use-case/interface testing won't catch abuse scenarios."},{"id":"d6_fc_035","domain":"D6","front":"Gray Hat vs White Hat \u2014 what's the key difference when a vulnerability is found?","back":"White Hat: has PERMISSION, fixes/reports through proper channels. Gray Hat: NO permission, but discloses to the company anyway (sometimes before publishing or for a fee) rather than exploiting maliciously like Black Hat."},{"id":"d6_fc_036","domain":"D6","front":"Which audit log management practice is GOOD (not a problem)?","back":"Logs reviewed regularly and in a timely fashion. The common PROBLEMS are: not reviewed regularly, not retained long enough, and not standardized for SIEM ingestion."},{"id":"d6_fc_037","domain":"D6","front":"What does Component Interface Testing check, specifically?","back":"DATA HANDLING as it passes BETWEEN two units/subsystems \u2014 narrower than full Integration Testing, broader than single-unit Unit Testing."},{"id":"d6_fc_038","domain":"D6","front":"Unit Testing vs Component Interface Testing vs Interface Testing \u2014 what's the scope of each?","back":"Unit Testing: ONE section/function of code in isolation. Component Interface Testing: data passed BETWEEN units. Interface Testing: ALL exposed interfaces of the finished application (APIs, UI, services)."},{"id":"d6_fc_039","domain":"D6","front":"White Box, Clear Box, and Crystal Box \u2014 how are these three terms related?","back":"They are SYNONYMS. All three describe a pen test where the tester has full admin-level knowledge of the organization's systems and infrastructure."},{"id":"d6_fc_040","domain":"D6","front":"After the 'System Browsing' phase of a pen test, where can the tester go next?","back":"Install Additional Tools (to dig deeper) OR back to Discovery (to revise strategy based on what was found). NOT 'Escalate Privileges' or 'Gaining Access' \u2014 those typically come BEFORE system browsing."},{"id":"d6_fc_041","domain":"D6","front":"Structured vs Unstructured audit \u2014 who performs each, and when?","back":"Unstructured: INTERNAL auditors, informal, done BEFORE the formal audit to catch issues early. Structured: EXTERNAL auditors, formal, independent, well-defined scope/objectives/methodology."},{"id":"d1_fc_001","domain":"D1","front":"What does the CIA Triad stand for, and what is its opposite?","back":"Confidentiality, Integrity, Availability. The opposite is DAD \u2014 Disclosure, Alteration, Destruction. Security is about finding the right BALANCE of the three for your organization."},{"id":"d1_fc_002","domain":"D1","front":"What controls/threats relate to Confidentiality?","back":"Use: encryption (AES256), secure transport (TLS/IPSEC), MFA, masking, least privilege, need-to-know. Threats: cryptanalysis, social engineering, keyloggers, steganography, IoT backdoors."},{"id":"d1_fc_003","domain":"D1","front":"What does IAAA stand for?","back":"Identification, Authentication, Authorization, Accountability (Auditing). Identification = 'I am Thor'; Authentication = 'Prove it'; Authorization = what you can access; Accountability = trace an action to a subject (non-repudiation)."},{"id":"d1_fc_004","domain":"D1","front":"Least Privilege vs. Need to Know","back":"Least Privilege = give the minimum access needed, no more, no less. Need to Know = even if you HAVE access, you shouldn't access data unless you have a valid reason to know it."},{"id":"d1_fc_005","domain":"D1","front":"What is Non-repudiation, and what two things does it rely on?","back":"A user cannot deny having performed an action. It uses both Authentication and Integrity."},{"id":"d1_fc_006","domain":"D1","front":"Subject vs. Object","back":"Subject = active (usually a user or program) that manipulates. Object = passive data (paper or digital) that is manipulated. A program can be both at different times."},{"id":"d1_fc_007","domain":"D1","front":"Governance vs. Management","back":"Governance = C-level executives set direction, objectives, and risk appetite (aggressive/neutral/adverse) \u2014 'not you'. Management = plans, builds, runs, monitors to reach those objectives, works with risk tolerance \u2014 'this is you'."},{"id":"d1_fc_008","domain":"D1","front":"In a top-down security organization, who is ULTIMATELY liable for security?","back":"Senior Leadership / Senior Management. You may also be liable depending on Due Care, but ultimate liability rests at the top. (The exam assumes top-down security.)"},{"id":"d1_fc_009","domain":"D1","front":"Due Diligence vs. Due Care","back":"Due Diligence = the research (best practices, evaluating new systems before implementing). Due Care = the prudent-person action (implementing, patching, fixing). Negligence is the opposite of Due Care; proving Due Care usually means you're not liable."},{"id":"d1_fc_010","domain":"D1","front":"Name the types of law tested on the CISSP (Criminal, Civil, Administrative).","back":"Criminal: society is victim, 'beyond reasonable doubt', punish/deter. Civil (Tort): individuals/orgs are victims, 'preponderance of proof', compensate victim. Administrative (Regulatory): laws by govt agencies (HIPAA, FDA)."},{"id":"d1_fc_011","domain":"D1","front":"What are the types of evidence (Real, Direct, Hearsay)?","back":"Real = tangible physical objects (the hard disk, NOT the data on it). Direct = firsthand witness testimony (5 senses). Hearsay = not firsthand knowledge (log files were traditionally hearsay), normally inadmissible."},{"id":"d1_fc_012","domain":"D1","front":"What is the Best Evidence Rule?","back":"Courts prefer the best evidence possible. Evidence should be accurate, complete, relevant, authentic, and convincing."},{"id":"d1_fc_013","domain":"D1","front":"What is Chain of Custody and what does it answer?","back":"Proves the integrity of evidence \u2014 that no tampering occurred. Answers: Who handled it? When? What did they do with it? Where did they handle it?"},{"id":"d1_fc_014","domain":"D1","front":"How do we protect evidence integrity in forensics?","back":"Use hashes. All forensics is done on COPIES, never the originals. Check the hash on both original and copy before AND after the forensics."},{"id":"d1_fc_015","domain":"D1","front":"Entrapment vs. Enticement","back":"Entrapment (illegal/unethical): persuading someone to commit a crime they had no intention of committing. Enticement (legal/ethical): making a crime more enticing to someone who has ALREADY decided to break the law. Honeypots use enticement."},{"id":"d1_fc_016","domain":"D1","front":"Copyright, Trademark, Patent, Trade Secret \u2014 durations and what they protect.","back":"Copyright: books/art/music/software, life+70yrs (or 95yrs corporate), automatic. Trademark: brand names/logos, 10yrs renewable indefinitely. Patent: inventions, 20yrs, must be novel/useful/nonobvious. Trade Secret: no protection if discovered."},{"id":"d1_fc_017","domain":"D1","front":"What is the (ISC)\u00b2 Code of Ethics \u2014 the four canons in order?","back":"1) Protect society, the common good, necessary public trust and confidence, and the infrastructure. 2) Act honorably, honestly, justly, responsibly, and legally. 3) Provide diligent and competent service to principals. 4) Advance and protect the profession."},{"id":"d1_fc_018","domain":"D1","front":"How are the (ISC)\u00b2 canons applied if two conflict?","back":"They are applied in ORDER \u2014 the canons are listed in priority order. Canon 1 (protect society) takes precedence over the others. There are only four mandatory canons."},{"id":"d1_fc_019","domain":"D1","front":"What is the GDPR data breach notification window, and the max fine?","back":"Breach notification within 72 hours. Max fine: \u20ac20 million OR 4% of annual worldwide turnover, whichever is GREATER. Applies to anyone with EU/EEA customers regardless of where based."},{"id":"d1_fc_020","domain":"D1","front":"Name three GDPR data subject rights.","back":"Right to access (free copy of their data), Right to erasure ('right to be forgotten'), Data portability (electronic format). Also: privacy by design, data protection officers, 72hr breach notification."},{"id":"d1_fc_021","domain":"D1","front":"What is the Wassenaar Arrangement?","back":"Export/import controls for conventional arms and dual-use goods/technologies. Cryptography is considered 'dual-use'. 41 countries. It's the organization's responsibility to know what's permitted to import/export to a country."},{"id":"d1_fc_022","domain":"D1","front":"Policies, Standards, Guidelines, Procedures, Baselines \u2014 which are mandatory?","back":"Mandatory: Policies (high-level), Standards (specific tech), Procedures (step-by-step), Baselines (minimum benchmarks). NON-mandatory: Guidelines (recommendations/suggestions)."},{"id":"d1_fc_023","domain":"D1","front":"Awareness vs. Training","back":"Awareness = changes user BEHAVIOR (this is what we want). Training = provides a skillset (nice, but useless if knowledge is ignored). Users often pose the largest security risk."},{"id":"d1_fc_024","domain":"D1","front":"Name the six Access Control TYPES.","back":"Preventative (stop it \u2014 IPS, encryption), Detective (find it \u2014 IDS, CCTV), Corrective (fix it \u2014 patches), Recovery (recover \u2014 backups, DR), Deterrent (discourage \u2014 fences, signs), Compensating (alternative when others are impractical)."},{"id":"d1_fc_025","domain":"D1","front":"Name the three Access Control CATEGORIES.","back":"Administrative (Directive): policies, procedures, training. Technical: hardware/software/firmware (firewalls, encryption). Physical: locks, fences, guards, dogs."},{"id":"d1_fc_026","domain":"D1","front":"What is the formula for Risk? And for Total Risk and Residual Risk?","back":"Risk = Threat \u00d7 Vulnerability. Total Risk = Threat \u00d7 Vulnerability \u00d7 Asset Value. Residual Risk = Total Risk \u2212 Countermeasures."},{"id":"d1_fc_027","domain":"D1","front":"Qualitative vs. Quantitative Risk Analysis","back":"Qualitative = 'quality', how likely & how bad (subjective, no $). Quantitative = 'quantity', actual cost in $ (fact-based, math). Normal flow: do qualitative first, then quantitative on the high/extreme items."},{"id":"d1_fc_028","domain":"D1","front":"Define AV, EF, SLE, ARO, and ALE.","back":"AV = Asset Value. EF = Exposure Factor (% lost). SLE = Single Loss Expectancy = AV \u00d7 EF. ARO = Annual Rate of Occurrence. ALE = Annualized Loss Expectancy = SLE \u00d7 ARO (cost per year if you do nothing)."},{"id":"d1_fc_029","domain":"D1","front":"What are the types of risk responses? Which is never acceptable?","back":"Accept, Mitigate (Reduce), Transfer (insurance), Avoid. Risk REJECTION (ignoring a known risk) is NEVER acceptable \u2014 you are liable. Secondary Risk = mitigating one risk opens another."},{"id":"d1_fc_030","domain":"D1","front":"When is mitigation worth implementing (ROI)?","back":"When TCO (Total Cost of Ownership of the mitigation) < ALE (the annual loss from doing nothing). If the countermeasure costs less than the loss it prevents, it makes fiscal sense."},{"id":"d1_fc_031","domain":"D1","front":"KGI vs. KPI vs. KRI","back":"KGI = Key Goal Indicator (did we achieve the requirement, after the fact). KPI = Key Performance Indicator (how well the process is performing). KRI = Key Risk Indicator (early warning of increasing risk exposure; tied to risk appetite)."},{"id":"d1_fc_032","domain":"D1","front":"What does RACI stand for?","back":"Responsible (does the work), Accountable (ultimately answerable, only ONE), Consulted (two-way communication, provides input), Informed (one-way communication, kept updated)."},{"id":"d1_fc_033","domain":"D1","front":"BCP vs. DRP","back":"BCP (Business Continuity Plan) = long-term, for the ENTIRE organization, the 'what', non-system-specific. DRP (Disaster Recovery Plan) = short-term, focuses on IT systems, the 'how', system-specific. DRP is a SUBSET of the BCP."},{"id":"d1_fc_034","domain":"D1","front":"Define RPO, MTD, RTO, and WRT.","back":"RPO = acceptable amount of data that can't be recovered (data loss). MTD = Maximum Tolerable Downtime, and MTD \u2265 RTO + WRT. RTO = time to restore the system (hardware). WRT = Work Recovery Time (configure recovered system / software)."},{"id":"d1_fc_035","domain":"D1","front":"MTBF vs. MTTR","back":"MTBF (Mean Time Between Failures) = how long a system/component functions on average before failing (plan for spares). MTTR (Mean Time to Repair) = how long to recover a failed system."},{"id":"d1_fc_036","domain":"D1","front":"What governance frameworks map to: IT goals, whole-org goals, IT service management?","back":"COBIT = goals for IT (stakeholder needs \u2192 IT goals). COSO = goals for the entire organization. ITIL = IT Service Management (ITSM)."},{"id":"d1_fc_037","domain":"D1","front":"What is Defense in Depth?","back":"Also called Layered or Onion Defense. Multiple overlapping security controls protect an asset \u2014 both physical and logical. No single control secures an asset. Improves CIA across the organization."},{"id":"d1_fc_038","domain":"D1","front":"Hearsay and log files \u2014 what changed?","back":"Computer-generated records (like log files) were traditionally considered hearsay and inadmissible, but case law and Federal Rule of Evidence 803 made business-activity records admissible if kept in the regular course of business."},{"id":"d1_fc_039","domain":"D1","front":"What is the NIST 800-30 first step in its 9-step risk process?","back":"System Characterization \u2014 define the risk management scope, boundaries, and system/data sensitivity. (NIST 800-30 is a 9-step risk management process.)"},{"id":"d1_fc_040","domain":"D1","front":"What are External Dependencies in a BIA, and why do they matter?","back":"Third-party services, suppliers, and resources needed for normal operations (cloud providers, ISPs, raw materials). Interruptions can cascade. JIT ordering of critical supplies can be risky (e.g. COVID-19). Manage with dependency mapping, contingency plans, and SLAs."},{"id":"d2_fc_001","domain":"D2","front":"What are the four stages of the Information Life Cycle?","back":"Data Acquisition, Data Use, Data Archival, Data Disposal. CIA must be maintained throughout."},{"id":"d2_fc_002","domain":"D2","front":"Labels vs. Clearance","back":"Labels are assigned to OBJECTS (e.g. 'Top Secret \u2013 Nuclear'). Clearance is assigned to SUBJECTS \u2014 a formal decision on current and future trustworthiness. Higher clearance = more in-depth background checks."},{"id":"d2_fc_003","domain":"D2","front":"What is required (besides clearance) to access classified data?","back":"Formal Access Approval (a document from the data owner) AND appropriate Security Clearance AND a valid Need to Know. The subject must understand the requirements and liability."},{"id":"d2_fc_004","domain":"D2","front":"What are the three states of data, and how is each protected?","back":"At Rest (disks/tapes/USB \u2192 encryption). In Motion (network transfer \u2192 encrypt traffic, end-to-end). In Use (actively used, can't be encrypted \u2192 clean desk, no shoulder surfing, screen locks, privacy screens)."},{"id":"d2_fc_005","domain":"D2","front":"Data/information owner vs. Data custodian","back":"Data owner = management level, assigns sensitivity labels and backup frequency. Data custodian = technical hands-on staff who do backups, restores, patches, config \u2014 following the data owner's directions."},{"id":"d2_fc_006","domain":"D2","front":"Data controller vs. Data processor","back":"Controllers create and manage the sensitive data (HR/Payroll). Processors manage the data on behalf of controllers (e.g. outsourced payroll)."},{"id":"d2_fc_007","domain":"D2","front":"What is Data Remanence?","back":"Data left over after normal removal and deletion of data. Deleting/formatting doesn't truly remove data \u2014 it's recoverable until overwritten."},{"id":"d2_fc_008","domain":"D2","front":"ROM vs. RAM (volatile or not?)","back":"ROM = non-volatile, retains memory after power loss (e.g. BIOS). RAM = volatile, loses content on power loss. SRAM (fast, latches/flip-flops, no refresh) vs. DRAM (slower, capacitors, must be refreshed)."},{"id":"d2_fc_009","domain":"D2","front":"Clear vs. Purge vs. Sanitization (data destruction)","back":"Clear (Overwrite) = writing 0s/random data over the data. Sanitization = rendering data infeasible to recover for a given effort level. Purge = removing data so recovery is infeasible even in a lab environment."},{"id":"d2_fc_010","domain":"D2","front":"How do you destroy data on an SSD? Why not degaussing?","back":"SSDs are EEPROM + DRAM and CANNOT be degaussed (no magnetic media). Use ATA Secure Erase and/or physical destruction. Degaussing only works on magnetic media (tapes, spinning disks)."},{"id":"d2_fc_011","domain":"D2","front":"Scoping vs. Tailoring","back":"Scoping = determining which PORTION of a standard applies to your org (what's in/out of scope). Tailoring = CUSTOMIZING a standard to your org (e.g. applying it but with stronger AES-256 encryption)."},{"id":"d2_fc_012","domain":"D2","front":"Certification vs. Accreditation","back":"Certification = the system & its controls meet the security requirements set by the data owner/regulations. Accreditation = the data owner ACCEPTS the certification and residual risk \u2014 required before production."},{"id":"d2_fc_013","domain":"D2","front":"What is a CASB (Cloud Access Security Broker)?","back":"On-prem or cloud software between users and cloud apps. Monitors user activity, warns of malicious actions, prevents malware, protects against shadow IT, enforces security policy compliance."},{"id":"d2_fc_014","domain":"D2","front":"What is DLP and what does it protect?","back":"Data Loss Prevention. Distinguishes loss vs. leak. Protects data in use, in motion, and at rest. Can be network-based or endpoint DLP."},{"id":"d2_fc_015","domain":"D2","front":"What is the data retention rule of thumb?","back":"Keep data no longer than its period of usefulness OR the legal requirement, whichever is GREATER. Regulations (HIPAA, PCI-DSS) may dictate specific retention. Know your retention requirements."},{"id":"d3_fc_001","domain":"D3","front":"Bell-LaPadula \u2014 what does it protect and what are its rules?","back":"Confidentiality (MAC). Simple Security Property: 'No Read UP'. * (star) Security Property: 'No Write DOWN'. Strong * Property: no read/write up or down (own level only)."},{"id":"d3_fc_002","domain":"D3","front":"Biba \u2014 what does it protect and what are its rules?","back":"Integrity (MAC). Simple Integrity Axiom: 'No Read DOWN'. * Integrity Axiom: 'No Write UP'. Invocation Property: no read or write UP. (Mnemonic: Biba = integrity, opposite reads/writes from Bell-LaPadula.)"},{"id":"d3_fc_003","domain":"D3","front":"Clark-Wilson model \u2014 what does it provide?","back":"Integrity. Separates users from back-end data using 'well-formed transactions' and 'separation of duties'. Uses Subject/Program/Object (a program sits between subject and object). Certifier and implementer must be different."},{"id":"d3_fc_004","domain":"D3","front":"Brewer-Nash (Chinese Wall) model \u2014 purpose?","back":"Mitigates conflict of interest in commercial organizations. Built on an information flow model \u2014 no information can flow between subjects/objects in a way that creates a conflict of interest."},{"id":"d3_fc_005","domain":"D3","front":"What is the Take-Grant Protection Model?","back":"Uses rules governing subject/object interactions with 4 rules: Take, Grant, Create, Remove. Permissions can be taken from or granted to other subjects."},{"id":"d3_fc_006","domain":"D3","front":"DAC vs. MAC vs. RBAC vs. ABAC vs. RUBAC","back":"DAC: owner's discretion (DACLs). MAC: system-enforced via labels/clearances. RBAC: based on role. ABAC: subject + object + environmental attributes. RUBAC: rule-based, IF/THEN statements."},{"id":"d3_fc_007","domain":"D3","front":"Name the four Security Modes (Dedicated, System High, Compartmented, Multilevel).","back":"Dedicated: clearance + NDA + approval + need-to-know for ALL data. System High: same but need-to-know for SOME. Compartmented: approval + need-to-know for SOME. Multilevel: clearance for SOME data."},{"id":"d3_fc_008","domain":"D3","front":"What is the Common Criteria (ISO 15408) \u2014 TOE, PP, ST, EAL?","back":"TOE = Target of Evaluation (the product). PP = Protection Profile (security requirements for a class of devices). ST = Security Target (the target's security properties). EAL = Evaluation Assurance Level 1-7 (test rigor)."},{"id":"d3_fc_009","domain":"D3","front":"What was 'The Orange Book' (TCSEC)?","back":"Trusted Computer System Evaluation Criteria, developed by US DoD in the 1980s \u2014 the earliest evaluation model most others are based on. Part of the Rainbow Series. The 'Red Book' (TNI) addressed network systems, which Orange Book did not."},{"id":"d3_fc_010","domain":"D3","front":"PASTA vs. STRIDE vs. DREAD threat modeling","back":"PASTA: attacker-focused, 7-step (Process for Attack Simulation and Threat Analysis). STRIDE: developer-focused (Spoofing, Tampering, Repudiation, Info disclosure, DoS, Elevation of privilege). DREAD: rating system (Damage, Reproducibility, Exploitability, Affected users, Discoverability)."},{"id":"d3_fc_011","domain":"D3","front":"Trust but Verify vs. Zero Trust","back":"Trust but Verify: implicit trust, then verify. Zero Trust (NIST SP 800-207): never trust, always verify \u2014 no implicit trust based on physical/logical location; authenticate both subject and device before every session."},{"id":"d3_fc_012","domain":"D3","front":"Fail Securely vs. Secure Defaults","back":"Fail Securely: if a system fails, it stays at least as secure as before (open/safe vs. closed/secure). Secure Defaults: ship as secure as possible, then remove security for usability based on risk analysis."},{"id":"d3_fc_013","domain":"D3","front":"Process Isolation vs. Memory Protection vs. Hardware Segmentation","back":"Memory Protection: prevents one process from affecting another's CIA. Process Isolation: logical control preventing process interference. Hardware Segmentation: maps processes to specific memory locations (a step further)."},{"id":"d3_fc_014","domain":"D3","front":"What is the Ring Model? What is Ring -1?","back":"4-ring model separating Users (untrusted, Ring 3) from Kernel (trusted, Ring 0). Most OSs use only rings 0 and 3. Ring -1 = Hypervisor mode for VM hosts, sits below Ring 0."},{"id":"d3_fc_015","domain":"D3","front":"Kernel mode vs. User mode","back":"Kernel mode (Supervisor mode): unrestricted access to memory/CPU/disk, most trusted, crashes are NOT recoverable. User mode (Problem mode): no direct hardware access (goes through API), crashes ARE recoverable."},{"id":"d3_fc_016","domain":"D3","front":"Monolithic kernel vs. Microkernel","back":"Monolithic: one static executable, all functionality precompiled, runs in supervisor mode. Microkernel: modular, smaller, adds functionality via loadable kernel modules, may run modules in user mode (Ring 3)."},{"id":"d3_fc_017","domain":"D3","front":"What is the Reference Monitor?","back":"A core function of the kernel that handles all access between subjects and objects. It is always on and cannot be bypassed."},{"id":"d3_fc_018","domain":"D3","front":"What is a TPM (Trusted Platform Module)?","back":"An international standard for a secure cryptoprocessor \u2014 a dedicated microcontroller that integrates cryptographic keys into devices. Used for RNG, encryption, hashing, secure key storage; most commonly for boot integrity."},{"id":"d3_fc_019","domain":"D3","front":"Type 1 vs. Type 2 Hypervisor","back":"Type 1 (Bare Metal): runs directly on host hardware, part of a virtualization OS (think data center). Type 2: runs on top of a regular OS like Windows (think your PC)."},{"id":"d3_fc_020","domain":"D3","front":"What is VM Escape?","back":"When an attacker jumps from a host or client VM to another client. A bigger concern with different trust-level clients on the same host \u2014 they should ideally be on separate hosts."},{"id":"d3_fc_021","domain":"D3","front":"IaaS vs. PaaS vs. SaaS","back":"IaaS: vendor provides infrastructure up to the OS; customer adds OS and up. PaaS: vendor provides pre-configured OS; customer adds apps. SaaS: vendor provides OS and applications (Gmail, Office 365)."},{"id":"d3_fc_022","domain":"D3","front":"What is Containerization (OS-level virtualization)?","back":"Removing redundant OS elements; apps run in containers with only required resources, sharing a host OS. Containers only see their own content. 10-100x more app density per server than normal virtualization."},{"id":"d3_fc_023","domain":"D3","front":"Polyinstantiation vs. Aggregation vs. Inference (database)","back":"Polyinstantiation: two+ versions of the same file shown based on clearance. Aggregation: gathering data to see the bigger picture. Inference: deducing from evidence/reasoning rather than explicit statements."},{"id":"d3_fc_024","domain":"D3","front":"Covert Timing Channel vs. Covert Storage Channel","back":"Timing: information leaked via response-time differences (e.g. wrong username 100ms vs. wrong password 600ms). Storage: hidden info via modification of a stored object (file sizes, ICMP payloads)."},{"id":"d3_fc_025","domain":"D3","front":"What is Steganography?","back":"Hiding a message within another medium (most commonly images or audio) by subtly altering pixels/data. To the naked eye it's not noticeable, but large amounts of info can be hidden."},{"id":"d3_fc_026","domain":"D3","front":"Symmetric vs. Asymmetric encryption \u2014 pros and cons.","back":"Symmetric: fast, strong per bit, but needs a pre-shared key, n(n-1)/2 keys. Asymmetric: no pre-shared key (2n keys), but slower and weaker per bit. Hybrid uses asymmetric to exchange a symmetric session key."},{"id":"d3_fc_027","domain":"D3","front":"How many keys for symmetric vs. asymmetric with n users?","back":"Symmetric: n(n-1)/2 keys (becomes unmanageable). Asymmetric: 2n keys (2 per user \u2014 a public/private key pair each)."},{"id":"d3_fc_028","domain":"D3","front":"Name common symmetric algorithms (DES, 3DES, AES, etc.).","back":"DES (insecure, 56-bit, 64-bit block, Feistel), 3DES (K1=112-bit, secure to 2030), AES/Rijndael (secure, transposition+substitution), IDEA, Blowfish (insecure), Twofish (secure), RC4 (insecure, stream), RC5/RC6 (secure)."},{"id":"d3_fc_029","domain":"D3","front":"AES \u2014 how many cycles for each key length?","back":"AES (Rijndael), symmetric, 4\u00d74 byte matrix. 128-bit key = 10 cycles, 192-bit = 12 cycles, 256-bit = 14 cycles. Uses both transposition and substitution; considered secure, open source."},{"id":"d3_fc_030","domain":"D3","front":"Name common asymmetric algorithms.","back":"Diffie-Hellman (key exchange, 1976), RSA (prime factorization, 1977), ECC (elliptic curve, strong per bit, low-power devices \u2014 256-bit ECC \u2248 3072-bit RSA), ElGamal, DSA (signing), Knapsack (insecure)."},{"id":"d3_fc_031","domain":"D3","front":"Which math problems underpin RSA, Diffie-Hellman, and ECC?","back":"RSA: prime number factorization (easy to multiply, hard to factor). Diffie-Hellman: discrete logarithms. ECC: discrete logarithms applied to elliptic curves (much stronger per bit)."},{"id":"d3_fc_032","domain":"D3","front":"Hash functions \u2014 what do they provide and what's a collision?","back":"Integrity. Variable-length input \u2192 fixed-length output (message digest). A collision is when two different inputs produce the same hash (possible but unlikely). Changing even 1 bit completely changes the hash."},{"id":"d3_fc_033","domain":"D3","front":"MD5 vs. SHA1 vs. SHA2 vs. SHA3 \u2014 security & size.","back":"MD5: 128-bit, collisions found, still widely used. SHA1: 160-bit, weak collision avoidance. SHA2: collision resistant. SHA3: finalized Aug 2015. Remember: variable-length input, fixed-length output."},{"id":"d3_fc_034","domain":"D3","front":"What does a Digital Signature provide, and how is it made?","back":"Provides Integrity and Non-Repudiation. You hash your message, then encrypt the hash with YOUR PRIVATE KEY. Recipient decrypts with your public key and compares hashes \u2014 if they match, the message is unaltered and authentic."},{"id":"d3_fc_035","domain":"D3","front":"What is a digital certificate, and who issues/revokes it?","back":"A public key signed with a digital signature. The CA (Certification Authority) issues and revokes certificates (internal or public like Verisign). CRL lists revoked certs (server-side); OCSP is the faster client/server hybrid replacement."},{"id":"d3_fc_036","domain":"D3","front":"IPSec \u2014 what do AH and ESP provide?","back":"AH (Authentication Header): authentication and integrity, NOT confidentiality, protects against replay. ESP (Encapsulation Security Payload): confidentiality, and can also provide authentication and integrity."},{"id":"d3_fc_037","domain":"D3","front":"IPSec Tunnel mode vs. Transport mode","back":"Tunnel mode: encrypts and authenticates the ENTIRE package including headers. Transport mode: only encrypts/authenticates the payload (used for systems that speak IPSec). IKE negotiates the algorithm selection."},{"id":"d3_fc_038","domain":"D3","front":"What is the One-Time Pad and why is it special?","back":"Plaintext combined with a truly random key. It is the ONLY mathematically unbreakable encryption \u2014 but impractical: one use per pad (never reuse), characters must be truly random, pads kept secure. (KGB reused pads \u2192 Project VENONA decoded them.)"},{"id":"d3_fc_039","domain":"D3","front":"Pass the Hash vs. Golden Ticket vs. Silver Ticket (Kerberos)","back":"Pass the Hash: use a stolen password hash + user ID to access. Silver Ticket: forged TGS ticket from a service account's NTLM hash (service privileges). Golden Ticket: forged from the krbtgt account hash \u2014 create ANY ticket in the domain."},{"id":"d3_fc_040","domain":"D3","front":"Known Plaintext vs. Chosen Plaintext vs. Adaptive Chosen Plaintext","back":"Known Plaintext: you know plaintext + ciphertext, try to find the key. Chosen Plaintext: attacker CHOOSES the plaintext. Adaptive Chosen Plaintext: attacker adapts each round based on the previous round's results."},{"id":"d3_fc_041","domain":"D3","front":"What is a Side Channel Attack?","back":"Using PHYSICAL data to break a crypto system \u2014 CPU cycles, power consumption, timing, temperature, electromagnetic emanations \u2014 rather than attacking the algorithm itself."},{"id":"d3_fc_042","domain":"D3","front":"What is Key Escrow vs. a Key Repository?","back":"Key Escrow: keys held by a 3rd party (often law enforcement). Key Repository: a central, secure store of key pairs; best practice requires TWO security admins to retrieve a key pair to reduce compromise risk."},{"id":"d3_fc_043","domain":"D3","front":"Perimeter physical controls \u2014 fences, bollards, lights, CCTV (what category each).","back":"Fences (deterrent/preventative \u2014 8ft+ prevents). Bollards (preventative \u2014 stop vehicles, allow foot traffic). Lights (detective/deterrent \u2014 measured in lux/lumens). CCTV (detective/deterrent)."},{"id":"d3_fc_044","domain":"D3","front":"What is a Mantrap?","back":"A room with two doors \u2014 Door 1 must fully close before Door 2 opens. Each door uses a different authentication method. Can use weight sensors to detect tailgating. Must allow safe evacuation in emergencies (people > stuff)."},{"id":"d3_fc_045","domain":"D3","front":"Why should data center walls be 'slab to slab'?","back":"Walls should run from the REAL floor to the REAL ceiling so attackers can't bypass via crawl spaces above sub-ceilings or below sub-floors. Defense in depth fails if there's an unsecured path in."},{"id":"d3_fc_046","domain":"D3","front":"Power fluctuation terms: Blackout, Brownout, Fault, Sag, Surge, Spike.","back":"Blackout = long power loss. Fault = short power loss. Brownout = long low voltage. Sag = short low voltage. Surge = long high voltage. Spike = short high voltage."},{"id":"d3_fc_047","domain":"D3","front":"What humidity range should a data center maintain, and why?","back":"40%\u201360% relative humidity. Low humidity causes static electricity; high humidity corrodes metals (electronics). Temperature: 68\u201377\u00b0F (20\u201325\u00b0C) typical."},{"id":"d3_fc_048","domain":"D3","front":"What three things does a fire need, and how do suppression methods work?","back":"Oxygen, Heat, Fuel. Remove any one to extinguish. Remove oxygen (Halon, FM200, Argon, CO2). Remove heat (water, chemicals). Removing fuel is rare (the fuel is your equipment)."},{"id":"d3_fc_049","domain":"D3","front":"Wet pipe vs. Dry pipe vs. Deluge vs. Pre-action sprinklers","back":"Wet pipe: pipes always full of water. Dry pipe: pipes hold compressed air (for frost-prone areas). Deluge: heads are OPEN, deluge valve holds water back. Pre-action: water enters only after fire alarm AND head opens (double interlock)."},{"id":"d3_fc_050","domain":"D3","front":"What is the PASS method for fire extinguishers?","back":"Pull the pin, Aim at the base of the fire, Squeeze the lever slowly, Sweep side to side. Never use an extinguisher on a fire class it wasn't designed for."},{"id":"d3_fc_051","domain":"D3","front":"Why is Halon no longer installed, and what replaced it?","back":"Halon depletes atmospheric ozone (banned by the Montreal Accord/Protocol for new production since 1994). Replacements: Argon, FE-13, FM-200 (HFC-227ea), Inergen. Gas systems need a visible/audible countdown for staff to exit."},{"id":"d3_fc_052","domain":"D3","front":"CO2 fire suppression \u2014 what's the danger?","back":"CO2 should only be used in UNMANNED areas \u2014 it's colorless and odorless, displaces oxygen, and causes people to pass out and die. Staff in CO2 areas need proper safety training."},{"id":"d3_fc_053","domain":"D3","front":"Confusion vs. Diffusion vs. Substitution vs. Permutation","back":"Confusion: relationship between plaintext and ciphertext (as random as possible). Diffusion: dispersing the order of plaintext in ciphertext. Substitution: replace one character with another (confusion). Permutation/transposition: rearranging characters (also confusion)."},{"id":"d3_fc_054","domain":"D3","front":"What is the difference between SCADA, DCS, and PLC?","back":"ICS = umbrella term. SCADA: supervisory control with GUI for high-level process management. DCS: distributed autonomous controllers with central supervisory control. PLC: ruggedized industrial digital computer controlling manufacturing processes."},{"id":"d3_fc_055","domain":"D3","front":"Java applets vs. ActiveX","back":"Java applets: run in a SANDBOX (segmented from OS), OS-agnostic. ActiveX: runs with certificates (NOT sandboxed), interacts more with the OS, Windows only."},{"id":"d4_fc_001","domain":"D4","front":"Name the 7 OSI layers (1-7) and a mnemonic.","back":"1 Physical, 2 Data Link, 3 Network, 4 Transport, 5 Session, 6 Presentation, 7 Application. 1\u21927: 'Please Do Not Throw Sausage Pizza Away'. 7\u21921: 'All People Seem To Need Data Processing'."},{"id":"d4_fc_002","domain":"D4","front":"What are the PDUs at each OSI layer?","back":"Data (Application/Presentation/Session, L5-7), Segments (Transport, L4), Packets (Network, L3), Frames (Data Link, L2), Bits (Physical, L1)."},{"id":"d4_fc_003","domain":"D4","front":"What lives at OSI Layer 2 (Data Link)?","back":"MAC addresses, LLC (Logical Link Control, error detection), ARP (L2/3), switches/bridges, CSMA/CD (Ethernet), CSMA/CA (wireless). Threats: MAC spoofing, MAC flooding."},{"id":"d4_fc_004","domain":"D4","front":"Exam tip: a protocol starting with 'I' is usually which OSI layer?","back":"Layer 3 (Network) \u2014 IP, IGMP, IGRP, IPSEC, IKE, ISAKMP are all L3. The exception is IMAP, which is Layer 7 (Application)."},{"id":"d4_fc_005","domain":"D4","front":"TCP vs. UDP","back":"TCP: reliable, connection-oriented, guaranteed delivery, 3-way handshake, slower/more overhead, reassembled. UDP: connectionless, unreliable, fast (VOIP, live video, gaming) \u2014 timing matters more than delivery confirmation."},{"id":"d4_fc_006","domain":"D4","front":"What are the 4 layers of the TCP/IP model and how do they map to OSI?","back":"Link/Physical (OSI L1-2), Internet (OSI L3), Transport (OSI L4), Application (OSI L5-6-7). Higher = slower and smarter."},{"id":"d4_fc_007","domain":"D4","front":"What is a MAC address structure (EUI-48)?","back":"48-bit hexadecimal. First 24 bits = manufacturer (OUI), last 24 bits = unique host identifier. EUI-64 uses 24 for manufacturer, 40 for unique ID. Easily spoofed."},{"id":"d4_fc_008","domain":"D4","front":"Name the port ranges (well-known, registered, dynamic).","back":"Well-known: 0-1023 (protocols). Registered: 1024-49151 (vendor apps). Dynamic/Private/Ephemeral: 49152-65535 (anyone, anything)."},{"id":"d4_fc_009","domain":"D4","front":"Common ports: FTP, SSH, Telnet, SMTP, HTTP, HTTPS, DNS, RDP.","back":"FTP: 20 (data)/21 (control) TCP. SSH: 22. Telnet: 23. SMTP: 25. HTTP: 80. POP3: 110. IMAP: 143. HTTPS: 443. DNS: 53 (TCP+UDP). RDP: 3389."},{"id":"d4_fc_010","domain":"D4","front":"What ports does DNS use, and what is DNSSEC?","back":"DNS uses TCP and UDP port 53; natively no authentication (mostly UDP). DNSSEC adds Authentication and Integrity via PKI \u2014 but NOT confidentiality (like a digital signature for DNS). Defends against DNS poisoning."},{"id":"d4_fc_011","domain":"D4","front":"What are the RFC 1918 private address ranges?","back":"10.0.0.0\u201310.255.255.255 (/8), 172.16.0.0\u2013172.31.255.255 (/12), 192.168.0.0\u2013192.168.255.255 (/16). Not routable on the internet. 127.0.0.0/8 = loopback. 169.254.0.0/16 = link-local."},{"id":"d4_fc_012","domain":"D4","front":"NAT vs. PAT","back":"NAT (Network Address Translation): translates IPs \u2014 static NAT is 1-to-1 (impractical). PAT (Port Address Translation): uses IP AND port to map one public IP to many private IPs (one-to-many / NAT overload)."},{"id":"d4_fc_013","domain":"D4","front":"Unicast vs. Multicast vs. Broadcast","back":"Unicast: one-to-one. Multicast: one-to-many (predefined list). Broadcast: one-to-all on a LAN. Limited L3 broadcast (255.255.255.255) and L2 broadcast (FF:FF:FF:FF:FF:FF) are dropped by routers."},{"id":"d4_fc_014","domain":"D4","front":"What is ARP and what is ARP poisoning?","back":"Address Resolution Protocol \u2014 translates IP addresses to MAC addresses. It's simple and trusting; anyone can respond. ARP poisoning = attacker sends fake ARP responses (often for the default gateway). Countermeasure: hardcode ARP entries."},{"id":"d4_fc_015","domain":"D4","front":"What is ICMP used for, and what does no Echo reply mean?","back":"Used for Ping (echo request/reply) and TTL exceeds in Traceroute; troubleshooting. An Echo reply means the host is up \u2014 but NO reply doesn't mean it's down (firewalls/routers can block ICMP)."},{"id":"d4_fc_016","domain":"D4","front":"Telnet vs. SSH","back":"Telnet: TCP 23, all data PLAINTEXT including credentials \u2014 should not be used. SSH: secure replacement for Telnet/FTP/HTTP, provides a secure connection over an unsecured network."},{"id":"d4_fc_017","domain":"D4","front":"FTP vs. SFTP vs. FTPS vs. TFTP","back":"FTP: no confidentiality/integrity, TCP 20/21. SFTP: FTP secured with SSH. FTPS: FTP secured with TLS/SSL. TFTP: trivial FTP, UDP 69, no auth, used for bootstrapping diskless workstations."},{"id":"d4_fc_018","domain":"D4","front":"SNMP versions \u2014 which are insecure?","back":"SNMPv1 and SNMPv2 send data in CLEARTEXT (default community strings 'public'/'private'). SNMPv3 uses encryption providing CIA \u2014 should be the standard."},{"id":"d4_fc_019","domain":"D4","front":"What ports do BOOTP and DHCP use?","back":"Both use UDP port 67 for the server and UDP port 68 for the client. BOOTP determines OS (downloaded via TFTP) and IP for diskless workstations; DHCP dynamically assigns IPs."},{"id":"d4_fc_020","domain":"D4","front":"UTP vs. STP vs. Fiber cables (EMI susceptibility, security).","back":"UTP (Unshielded Twisted Pair): cheap, susceptible to EMI/eavesdropping. STP (Shielded): metal mesh, less EMI, thicker/pricier. Fiber: no EMI, can't be easily sniffed, fast, long distance \u2014 most secure but pricier."},{"id":"d4_fc_021","domain":"D4","front":"EMI vs. Crosstalk vs. Attenuation","back":"EMI: magnetism disrupting availability/integrity. Crosstalk: signal crossing from one cable to another (confidentiality issue). Attenuation: signal weakening over distance. Keep power cables away from copper data cables; use STP or fiber."},{"id":"d4_fc_022","domain":"D4","front":"LAN topologies: Bus, Ring, Star, Mesh \u2014 fault tolerance.","back":"Bus: single break breaks all nodes past it. Ring: nodes in a loop. Star: all to a central device (Ethernet/switch) \u2014 best fault tolerance, a break affects only one node. Mesh: partial or full (full = max redundancy, lots of cables)."},{"id":"d4_fc_023","domain":"D4","front":"WEP vs. WPA vs. WPA2 vs. WPA3","back":"WEP (1997): broken in minutes, don't use. WPA (2003): RC4+TKIP, interim, insecure now. WPA2 (2004/RSN): AES + CCMP, most common. WPA3 (2020): 192-bit, SAE replaces PSK, AES-256 GCM with SHA-384."},{"id":"d4_fc_024","domain":"D4","front":"What is an Evil Twin attack?","back":"An attacker creates a rogue access point with the SAME SSID as yours but with no security \u2014 user devices automatically connect to it. Compromises confidentiality and integrity."},{"id":"d4_fc_025","domain":"D4","front":"802.11 frequency bands \u2014 2.4 GHz vs. 5/6 GHz","back":"2.4 GHz: crowded (Bluetooth, microwaves, cordless phones, baby monitors), longer waves penetrate walls better. 5/6 GHz: less crowded, shorter waves, poorer wall penetration. 6 GHz is newest and least crowded."},{"id":"d4_fc_026","domain":"D4","front":"Bluetooth attacks: Bluejacking, Bluesnarfing, Bluebugging.","back":"Bluejacking: sending unsolicited messages (harmless/annoying). Bluesnarfing: unauthorized ACCESS to info on a device. Bluebugging: attacker gains TOTAL control of the device (older phones in discoverable state)."},{"id":"d4_fc_027","domain":"D4","front":"Layer 1, 2, 3 network devices.","back":"L1: repeaters (extend signal), hubs (multi-port repeaters, all traffic out all ports, insecure). L2: bridges (2-port), switches (multi-port, MAC-based, each port = collision domain). L3: routers (forward by IP)."},{"id":"d4_fc_028","domain":"D4","front":"What is a VLAN and how does it work?","back":"Virtual LAN \u2014 a broadcast domain partitioned and isolated at Layer 2. Specific switch ports are assigned to a VLAN; VLANs use tags within packets. Allows logically separate networks on shared physical devices. VLAN trunks span VLANs across switches."},{"id":"d4_fc_029","domain":"D4","front":"Switch security best practices.","back":"Shut unused ports down, assign ports to specific VLANs, use MAC sticky (only allow that MAC on the port, warn or shut if another appears), use VLAN pruning for trunk ports."},{"id":"d4_fc_030","domain":"D4","front":"Distance-vector vs. Link-state routing protocols","back":"Distance-vector (RIP): only counts hops, ignores bandwidth, uses shortest path \u2014 older. Link-state (OSPF): each node runs an algorithm using link cost (incl. bandwidth), faster convergence, syncs on topology changes."},{"id":"d4_fc_031","domain":"D4","front":"RIP, OSPF, BGP \u2014 what are they?","back":"RIP: distance-vector, max 15 hops, UDP 520, updates every 30s. OSPF: link-state, IGP, encapsulated directly in IP (protocol 89), fast convergence. BGP: path-vector, the routing protocol of the INTERNET, routes between Autonomous Systems."},{"id":"d4_fc_032","domain":"D4","front":"What is MPLS and what layer does it operate at?","back":"Multiprotocol Label Switching \u2014 directs data by short path LABELS, not IP addresses. Operates between L2 and L3 ('layer 2.5'). Often used for MPLS VPN connections between distant org locations."},{"id":"d4_fc_033","domain":"D4","front":"Firewall types by OSI layer: packet filter, stateful, application.","back":"Packet filtering: L1-3, inspects packets against rules (checked in order). Stateful: L1-4, tracks connection state. Application (proxy): L7, understands applications/protocols, sees the full decrypted payload."},{"id":"d4_fc_034","domain":"D4","front":"What is a Next-Generation Firewall (NGFW)?","back":"Combines traditional firewall + Deep Packet Inspection (DPI) + network security (IDS/IPS, malware/antivirus). DPI looks at the actual data the packet carries, not just the protocol header. Spans more OSI layers."},{"id":"d4_fc_035","domain":"D4","front":"Bastion Host vs. Dual-Homed Host vs. Screened Subnet","back":"Bastion Host: hardened single-purpose host, faces untrusted networks/DMZ. Dual-Homed Host: 2 NICs (trusted + untrusted), doesn't route. Screened Subnet: uses 2 firewalls (defense in depth) to establish a DMZ."},{"id":"d4_fc_036","domain":"D4","front":"What is a DMZ, and how do firewalls fail?","back":"DMZ: a subnetwork exposing external-facing services to an untrusted network while the internal LAN stays firewalled. Firewalls fail CLOSED \u2014 if they crash or are flooded, they block all traffic."},{"id":"d4_fc_037","domain":"D4","front":"What is 802.1X \u2014 the three parties?","back":"Encapsulates EAP (Extensible Authentication Protocol). Three parties: Supplicant (client device), Authenticator (switch or wireless AP), AS (Authentication Server, typically RADIUS+EAP)."},{"id":"d4_fc_038","domain":"D4","front":"PAP vs. CHAP","back":"PAP: sends credentials in PLAINTEXT at connection start \u2014 one of the oldest, insecure. CHAP: three-way handshake, shared secret never sent over the network, protects against replay attacks; used by PPP servers."},{"id":"d4_fc_039","domain":"D4","front":"PPTP vs. L2TP vs. IPSec for VPNs","back":"PPTP: obsolete, many known issues, TCP control + GRE tunnel. L2TP: no built-in encryption, relies on a passed-in encryption protocol. IPSec: operates at the Internet layer, secures ALL IP application traffic."},{"id":"d4_fc_040","domain":"D4","front":"North-South vs. East-West traffic","back":"North-South: between a client/server and the outside world, traverses multiple segments, subject to firewalls/IPS. East-West: between servers/devices within the same segment (often VMs/containers on the same host), may have less scrutiny."},{"id":"d4_fc_041","domain":"D4","front":"Throughput vs. Latency vs. Jitter vs. Packet Loss","back":"Throughput: actual rate of successful data transfer. Latency: time for a packet source\u2192destination (ms). Jitter: variation in latency over time (matters for VOIP/video). Packet Loss: % of packets dropped."},{"id":"d4_fc_042","domain":"D4","front":"What is SDN (Software-Defined Networking)?","back":"Lets admins control network behavior dynamically via software by separating the router's CONTROL plane (routing decisions) from the DATA plane (forwarding). Makes you hardware-vendor agnostic."},{"id":"d4_fc_043","domain":"D4","front":"What is VXLAN and why use it?","back":"Virtual eXtensible LAN \u2014 an encapsulation protocol letting VLANs span subnets and distant locations. Supports up to 16 million virtual networks (vs. VLAN's 4,096). Enables micro-segmentation without local-only restrictions."},{"id":"d4_fc_044","domain":"D4","front":"RDP vs. VNC","back":"RDP (Remote Desktop Protocol): Microsoft proprietary, GUI, listens on TCP and UDP 3389. VNC (Virtual Network Computing): non-Microsoft, runs on most OSs via screen scraping."},{"id":"d4_fc_045","domain":"D4","front":"Circuit Switching vs. Packet Switching","back":"Circuit switching: dedicated channel, guarantees full bandwidth, expensive, used less today. Packet switching: data sent in packets via multiple paths, cheap, no capacity guarantee, widely used. QoS prioritizes real-time traffic (VOIP)."},{"id":"d7_fc_001","domain":"D7","front":"Separation of Duties, Job Rotation, Mandatory Vacations \u2014 purpose?","back":"All mitigate insider threats/fraud. Separation of Duties: no single person controls a whole task. Job Rotation: detect fraud, reduce collusion. Mandatory Vacations: lock the account and audit while they're away to detect/prevent fraud."},{"id":"d7_fc_002","domain":"D7","front":"What is PAM (Privileged Access Management)?","back":"Identify and closely monitor anyone with more access than a normal user. The higher the privilege, the closer the monitoring. Use full monitoring, limit privileges, MFA, immutable logs, anomaly detection, no group accounts."},{"id":"d7_fc_003","domain":"D7","front":"What is the forensic process order?","back":"Identification \u2192 Preservation \u2192 Collection \u2192 Examination \u2192 Analysis \u2192 Presentation (in court) \u2192 Decision. Evidence must be accurate, complete, authentic, convincing, and admissible."},{"id":"d7_fc_004","domain":"D7","front":"In what order do you collect forensic evidence (volatility)?","back":"Most volatile to least volatile \u2014 start with RAM (memory) and end with hard disks. Handle evidence as little as possible; work on bit-level copies, confirming the hash matches before and after."},{"id":"d7_fc_005","domain":"D7","front":"Allocated vs. Unallocated vs. Slack space (forensics)","back":"Allocated: actively contains data. Unallocated: no active data (incl. d
