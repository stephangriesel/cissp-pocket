}

function reset(){deck=buildDeck();idx=0;flipped=false;qAnswered=false;upd();render();}

function clearAllActions(){
  saveLocalActions({});
}

async function newSession(){
  clearAllActions();
  upd();
  if(reviewMode)showReviewList();
  try{
    await sb.from('progress').update({last_action:null}).not('last_action','is',null);
  }catch(e){/* local clear already happened; remote will be stale until reconnect */}
}

function confirmNewSession(){
  if(confirm('Reset Got it / Again counters and clear the review list? This won\'t affect your study time or card progress.')){
    newSession();
  }
}

let reviewMode=false;
let jumpedFromReview=false;

function showReviewList(){
  reviewMode=true;
  const actions=getLocalActions();
  const allCards=[...DATA.flashcards,...DATA.questions];
  const reviewCards=allCards.filter(c=>actions[c.id]==='again');
  const a=document.getElementById('cardArea');
  if(reviewCards.length===0){
    a.innerHTML='<div class="session-end"><div class="end-icon">✅</div><div class="end-title">Nothing to review</div><div class="end-sub">No cards are currently marked "Again".</div><button class="restart-btn" onclick="exitReviewList()">Back to studying</button></div>';
    return;
  }
  const items=reviewCards.map(c=>{
    const text=c.front||c.question;
    const isFlash=!!c.front;
    return '<div class="q-card" style="margin-bottom:10px;cursor:pointer" onclick="jumpToReviewCard(\''+c.id+'\','+isFlash+')"><div class="q-domain '+dc(c.domain)+'">'+c.domain+'</div><div class="q-text" style="margin-bottom:0">'+text+'</div></div>';
  }).join('');
  a.innerHTML='<div style="font-size:13px;color:var(--muted);padding:4px 4px 8px">'+reviewCards.length+' card(s) marked "Again" — tap one to review it now</div>'+items+'<button class="restart-btn" style="margin-top:8px;width:100%" onclick="exitReviewList()">Back to studying</button>';
}

function jumpToReviewCard(cardId,isFlash){
  reviewMode=false;
  jumpedFromReview=true;
  mode=isFlash?'flash':'quiz';
  const src=isFlash?DATA.flashcards:DATA.questions;
  const card=src.find(c=>c.id===cardId);
  deck=[card];
  idx=0;flipped=false;qAnswered=false;
  document.getElementById('tabFlash').className='tab'+(mode==='flash'?' active':'');
  document.getElementById('tabQuiz').className='tab'+(mode==='quiz'?' active':'');
  render();
}

function exitReviewList(){
  reviewMode=false;
  render();
}

function upd(){
  document.getElementById('statTotal').textContent=deck.length;
  const stats=computeStats();
  document.getElementById('statGot').textContent=stats.got;
  document.getElementById('statAgain').textContent=stats.again;
  const pct=deck.length>0?Math.round((idx/deck.length)*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=idx+' / '+deck.length;
}

function dc(d){return d.toLowerCase();}

function render(){
  const a=document.getElementById('cardArea');
  if(idx>=deck.length){
    if(jumpedFromReview){jumpedFromReview=false;showReviewList();return;}
    renderEnd(a);return;
  }
  if(mode==='flash')renderFlash(a);
  else renderQuiz(a);
  upd();
}

function renderFlash(a){
  const c=deck[idx];
  a.innerHTML='<div class="flashcard" id="fc" onclick="flip()"><div class="card-front"><div class="card-domain '+dc(c.domain)+'">'+c.domain+'</div><div class="card-label">Tap to reveal</div><div class="card-text">'+c.front+'</div></div><div class="card-back"><div class="card-domain '+dc(c.domain)+'">'+c.domain+'</div><div class="card-label">Answer</div><div class="card-text">'+c.back+'</div></div></div><div class="flip-hint" id="fh">Tap card to reveal answer</div><div class="rating-btns" id="rb" style="display:none"><button class="rating-btn btn-again" onclick="rate(-1)">Need to review</button><button class="rating-btn btn-got-it" onclick="rate(1)">Got it ✓</button></div>';
}

function flip(){
  if(!flipped){document.getElementById('fc').classList.add('flipped');document.getElementById('fh').style.display='none';document.getElementById('rb').style.display='grid';flipped=true;}
}

function rate(s){
  const c=deck[idx];const p=getP();p[c.id]=(p[c.id]||0)+s;saveP(p);
  const action=s>0?'got':'again';
  syncCard(c.id,p[c.id],action);
  idx++;flipped=false;render();
}

function renderQuiz(a){
  const c=deck[idx];
  const opts=c.options.map((o,i)=>'<button class="q-option" id="o'+i+'" onclick="ans('+i+','+c.answer+',\''+c.id+'\')">'+String.fromCharCode(65+i)+'. '+o+'</button>').join('');
  a.innerHTML='<div class="q-card"><div class="q-domain '+dc(c.domain)+'">'+c.domain+'</div><div class="q-text">'+c.question+'</div><div class="q-options">'+opts+'</div><div id="qe" style="display:none" class="q-explanation"></div></div><button class="q-next" id="qn" style="display:none" onclick="nextQ()">Next question →</button>';
  qAnswered=false;
}

function ans(chosen,correct,cid){
  if(qAnswered)return;qAnswered=true;
  const c=deck[idx];const p=getP();const ok=chosen===correct;
  p[cid]=(p[cid]||0)+(ok?1:-1);saveP(p);
  const action=ok?'got':'again';
  syncCard(cid,p[cid],action);
  c.options.forEach((_,i)=>{
    const el=document.getElementById('o'+i);
    if(i===correct)el.className='q-option correct';
    else if(i===chosen&&!ok)el.className='q-option wrong';
    el.disabled=true;
  });
  document.getElementById('qe').textContent=c.explanation;
  document.getElementById('qe').style.display='block';
  document.getElementById('qn').style.display='block';
  upd();
}

function nextQ(){idx++;qAnswered=false;render();}

function renderEnd(a){
  const stats=computeStats();
  const total=stats.got+stats.again;
  const pct=total>0?Math.round((stats.got/total)*100):0;
  a.innerHTML='<div class="session-end"><div class="end-icon">'+(pct>=70?'🎯':'📚')+'</div><div class="end-title">'+(pct>=70?'Deck complete!':'Deck complete \u2014 keep grinding.')+'</div><div class="end-sub">'+stats.got+' of '+total+' correct overall ('+pct+'%).<br>Weak cards surface more next round.</div><button class="restart-btn" onclick="reset()">Go again</button></div>';
  upd();
}

const EDGE_FN='https://qdcfdppcaoffbkjnfvzd.supabase.co/functions/v1/verify-password';

async function checkAuth(){
  const token=localStorage.getItem('cissp_token');
  if(token){
    try{
      const r=await fetch(EDGE_FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
      const d=await r.json();
      if(d.valid){unlockApp();return;}
    }catch(e){}
  }
  const overlay=document.getElementById('authOverlay');
  overlay.style.display='flex';
  setTimeout(()=>document.getElementById('authInput').focus(),100);
}

async function submitPassword(){
  const pw=document.getElementById('authInput').value;
  const err=document.getElementById('authError');
  err.textContent='';
  if(!pw)return;
  const btn=document.querySelector('.auth-btn');
  btn.disabled=true;btn.textContent='Checking…';
  try{
    const r=await fetch(EDGE_FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const d=await r.json();
    if(d.valid&&d.token){
      localStorage.setItem('cissp_token',d.token);
      unlockApp();
    }else{
      err.textContent='Incorrect password.';
      btn.disabled=false;btn.textContent='Unlock';
    }
  }catch(e){
    err.textContent='Connection error. Try again.';
    btn.disabled=false;btn.textContent='Unlock';
  }
}

function unlockApp(){
  document.getElementById('authOverlay').style.display='none';
  loadProgress();
}

checkAuth();

// PWA
let _pwaPrompt=null;
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js'));
}
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  _pwaPrompt=e;
  if(!sessionStorage.getItem('pwa_dismissed')){
    document.getElementById('pwaBar').classList.add('visible');
  }
});
async function installPWA(){
  if(!_pwaPrompt)return;
  _pwaPrompt.prompt();
  const{outcome}=await _pwaPrompt.userChoice;
  if(outcome==='accepted')_pwaPrompt=null;
  document.getElementById('pwaBar').classList.remove('visible');
}
function dismissPWA(){
  document.getElementById('pwaBar').classList.remove('visible');
  sessionStorage.setItem('pwa_dismissed','1');
}
</script>
