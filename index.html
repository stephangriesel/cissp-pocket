eleted files marked free \u2014 still recoverable). Slack space: leftover space in a cluster after a file, may hide old data or attacker-hidden data."},{"id":"d7_fc_006","domain":"D7","front":"Event vs. Alert vs. Incident vs. Problem","back":"Event: observable change in state (neutral). Alert: a warning triggered by an event. Incident: multiple adverse events, often caused by people. Problem: an incident with an unknown cause (needs root-cause analysis)."},{"id":"d7_fc_007","domain":"D7","front":"Inconvenience vs. Emergency vs. Disaster vs. Catastrophe","back":"Inconvenience: non-disruptive failure (one disk, one server in a cluster). Emergency/Crisis: potential loss of life or property. Disaster: facility unusable 24+ hours. Catastrophe: facility destroyed."},{"id":"d7_fc_008","domain":"D7","front":"What is the 8-step incident response lifecycle?","back":"1) Preparation, 2) Detection (Identification), 3) Response (Containment), 4) Mitigation (Eradication), 5) Reporting, 6) Recovery, 7) Remediation, 8) Lessons Learned."},{"id":"d7_fc_009","domain":"D7","front":"IDS vs. IPS","back":"IDS (Intrusion Detection System): passive \u2014 monitors and ALERTS only, takes no action. IPS (Intrusion Prevention System): also takes ACTION (drop/redirect traffic). Both are essentially packet sniffers with analysis engines."},{"id":"d7_fc_010","domain":"D7","front":"Network-based vs. Host-based IDS/IPS","back":"NIDS/NIPS: on a network segment (switch port in promiscuous mode, span port), sees traffic but CAN'T inspect encrypted packets. HIDS/HIPS: on a single host, CAN see decrypted data but slows the host; attacks can disable it."},{"id":"d7_fc_011","domain":"D7","front":"Signature-based vs. Heuristic (behavioral) IDS/IPS","back":"Signature-based: matches known malware patterns, fast, but vulnerable to 0-days and needs constant updates. Heuristic/behavioral: baselines normal traffic and flags anomalies \u2014 can catch 0-days but produces more false positives and needs tuning."},{"id":"d7_fc_012","domain":"D7","front":"True/False Positive/Negative in IDS alerts.","back":"True Positive: attack happens, system detects/acts. True Negative: normal traffic, system does nothing. False Positive: normal traffic, system acts (alerts). False Negative: attack happens, system MISSES it (the worst)."},{"id":"d7_fc_013","domain":"D7","front":"SIEM vs. SOAR","back":"SIEM (Security Information and Event Management): centralizes/correlates logs across all systems for near-real-time analysis \u2014 but only alerts. SOAR (Security Orchestration, Automation, Response): uses AI to also REACT to events automatically, reducing alert overload."},{"id":"d7_fc_014","domain":"D7","front":"Honeypot vs. Honeynet","back":"Honeypot: a system that looks real but exists solely to attract attackers and learn about vulnerabilities. Honeynet: a network of honeypots. Best practice segments them via DMZ/firewall. Always consult legal first (entrapment vs. enticement)."},{"id":"d7_fc_015","domain":"D7","front":"Full vs. Incremental vs. Differential backups \u2014 restore & archive bit.","back":"Full: everything, clears archive bit, 1 tape to restore. Incremental: changes since last backup, clears archive bit, MANY tapes to restore. Differential: changes since last FULL, does NOT clear archive bit, only 2 tapes to restore."},{"id":"d7_fc_016","domain":"D7","front":"What is a Copy backup?","back":"A full backup that does NOT clear the archive bit. Often used before system updates/patches so you can revert to a good copy without disrupting the normal backup cycle."},{"id":"d7_fc_017","domain":"D7","front":"RAID 0 vs. RAID 1 vs. RAID 5","back":"RAID 0: striping, no redundancy, faster only, min 2 disks. RAID 1: mirroring, identical data on 2 disks. RAID 5: block-level striping with distributed parity, min 3 disks, speed + redundancy."},{"id":"d7_fc_018","domain":"D7","front":"Database Shadowing vs. Electronic Vaulting vs. Remote Journaling","back":"Shadowing: real-time exact copy of the database to another location. E-vaulting: remote backups sent off-site at intervals or on change. Remote Journaling: sends transaction LOG files (not the files), rebuilt from logs if originals lost."},{"id":"d7_fc_019","domain":"D7","front":"Recovery sites: Redundant, Hot, Warm, Cold \u2014 speed and cost.","back":"Redundant: identical real-time copy, instant failover, most expensive. Hot: critical systems, near-real-time data, <1hr switch. Warm: full DC but restore from backups, 4-24hr. Cold: empty DC (power/HVAC only), weeks to recover, cheapest."},{"id":"d7_fc_020","domain":"D7","front":"What is a Reciprocal Agreement site?","back":"A contract with another organization to share their data center space in a disaster (and vice versa). Can be promised space or segmented racks with hardware."},{"id":"d7_fc_021","domain":"D7","front":"BCP/DRP teams: Rescue, Recovery, Salvage.","back":"Rescue (Activation): deals with the disaster as it happens \u2014 evacuate, notify (call trees), initial damage assessment. Recovery (Failover): get alternate site running, MOST critical systems first. Salvage (Failback): return to primary site, LEAST critical systems first."},{"id":"d7_fc_022","domain":"D7","front":"BCP/DRP test types, least to most disruptive.","back":"DRP Review \u2192 Read-Through (Checklist) \u2192 Walk/Talk-through (Tabletop) \u2192 Simulation Test \u2192 Parallel Processing \u2192 Partial Interruption \u2192 Full Interruption (always off-hours, most disruptive)."},{"id":"d7_fc_023","domain":"D7","front":"What is a Call Tree and how does it operate?","back":"Each person calls a small number of others. Starts bottom-up (discoverer \u2192 manager \u2192 senior level/CEO) then top-down. Use 2-way confirmation. Printed and kept at home (assume no network). Automated call trees are preferred."},{"id":"d7_fc_024","domain":"D7","front":"What is Patch Tuesday and typical patch timing?","back":"Microsoft releases monthly patches on the 2nd Tuesday. Critical patches push outside it. Orgs usually review for a few weeks first. Pushes are done after hours (Fri/Sat, ~01:00-04:00), avoiding midnight (backup jobs run then)."},{"id":"d7_fc_025","domain":"D7","front":"0-day Vulnerability vs. Exploit vs. Attack","back":"0-day Vulnerability: not yet widely discovered/published. 0-day Exploit: code using the vulnerability. 0-day Attack: the actual attack using the code. Only real defense: defense in depth + immediate patching when available."},{"id":"d7_fc_026","domain":"D7","front":"What is Root-Cause Analysis and why does it matter?","back":"Determining the underlying weakness that allowed an incident. Without it, you'll face the same problem again. Fix the vulnerability on ALL affected systems org-wide, not just the one that was compromised."},{"id":"d7_fc_027","domain":"D7","front":"Active/Active vs. Active/Passive clustering","back":"Active/Active: both servers process traffic = load balancing. Active/Passive: primary is active, secondary is passive and sends keep-alive/heartbeat; if the active misses ~3 keepalives, the passive assumes the primary role."},{"id":"d7_fc_028","domain":"D7","front":"What is an MOU/MOA and when is it the answer?","back":"Memorandum of Understanding/Agreement \u2014 staff sign a legal document acknowledging responsibility for an activity. If a critical staff member didn't show up when required, the MOU/MOA could have fixed it. Used interchangeably on the exam."},{"id":"d8_fc_001","domain":"D8","front":"Why design security in rather than bolt it on?","back":"Software with security built in is much more secure than software where it's added later. Programmers make 15-50 mistakes per 1,000 lines of code; a maturity framework can lower that to ~1 per 1,000."},{"id":"d8_fc_002","domain":"D8","front":"What are the five programming language generations?","back":"1st: Machine Code. 2nd: Assembler. 3rd: C, C++, Java, Python, PHP, COBOL. 4th: SQL, ABAP, R, Unix Shell. 5th: Prolog, Mercury, OPS5 (AI/logic)."},{"id":"d8_fc_003","domain":"D8","front":"Compiled vs. Interpreted vs. Bytecode","back":"Compiled: translated to machine code once, run many times (executables). Interpreted: translated each time it runs. Bytecode: intermediary form, still needs conversion to machine code before running on the CPU."},{"id":"d8_fc_004","domain":"D8","front":"What is OOP and its key concepts (object, attribute, method, class)?","back":"Object-Oriented Programming \u2014 programs built from objects that interact. Object: contains data (attributes/fields) and code (methods). Class: the template defining the data and methods an object contains."},{"id":"d8_fc_005","domain":"D8","front":"Waterfall vs. Sashimi vs. Agile","back":"Waterfall: linear, can't go back. Sashimi: waterfall with overlapping phases, can go back ONE phase. Agile: iterative, adaptive planning, evolutionary development, embraces changing requirements."},{"id":"d8_fc_006","domain":"D8","front":"What are the four Agile Manifesto values?","back":"Individuals & interactions over processes/tools; Working software over comprehensive documentation; Customer collaboration over contract negotiation; Responding to change over following a plan."},{"id":"d8_fc_007","domain":"D8","front":"Scrum \u2014 the three core roles.","back":"Product Owner: voice of the customer, ensures the team delivers business value. Development Team (3-9 people): does the actual work, cross-functional. Scrum Master: removes impediments, ensures the framework is followed (not a traditional PM)."},{"id":"d8_fc_008","domain":"D8","front":"What is the Spiral model?","back":"A risk-driven model with four phases: Planning, Risk Analysis, Engineering, Evaluation. The project repeatedly passes through these in iterations ('spirals'), each building on the baseline spiral."},{"id":"d8_fc_009","domain":"D8","front":"What is the SDLC and the exam tip about it?","back":"Software Development Life Cycle \u2014 phases: investigation, analysis, design, build, test, implement, maintain/support, disposal. Exam tip: if an SDLC answer doesn't mention 'secure' or 'security', it's wrong \u2014 eliminate it."},{"id":"d8_fc_010","domain":"D8","front":"DevOps vs. DevSecOps","back":"DevOps: cooperation between Development, Operations, and QA; rapid deployment (CI/CD). DevSecOps: evolved from DevOps to integrate security THROUGHOUT the process \u2014 designed in, not added later."},{"id":"d8_fc_011","domain":"D8","front":"What is Source Code Escrow?","back":"Depositing source code with a third-party escrow agent. Released to the licensee if the licensor goes bankrupt or fails to maintain the software \u2014 protects against abandonment/orphaning."},{"id":"d8_fc_012","domain":"D8","front":"Database integrity types: Referential, Semantic, Entity.","back":"Referential: every foreign key matches a primary key in the parent table. Semantic: each attribute value is consistent with its data type. Entity: each row (tuple) has a unique, non-null primary key."},{"id":"d8_fc_013","domain":"D8","front":"What are the three Normal Forms in database normalization?","back":"1NF: divide data into tables, assign primary keys. 2NF: move partially-dependent-on-primary-key data to another table. 3NF: remove data not dependent on the primary key. Reduces redundancy, improves integrity."},{"id":"d8_fc_014","domain":"D8","front":"DDL vs. DML (database query language)","back":"DDL (Data Definition Language): defines structures \u2014 CREATE, ALTER, DROP. DML (Data Manipulation Language): works with data \u2014 SELECT, INSERT, UPDATE, DELETE."},{"id":"d8_fc_015","domain":"D8","front":"Coupling vs. Cohesion","back":"Coupling: degree of interdependence between modules (LOW is good). Cohesion: degree to which elements inside a module belong together (HIGH is good). Low coupling + high cohesion = well-structured, maintainable design."},{"id":"d8_fc_016","domain":"D8","front":"What is a primary key vs. a foreign key?","back":"Primary key: uniquely identifies each row in a table (non-null). Foreign key: a field that matches the primary key of another (parent) table, creating the relationship. A foreign key is always a primary key in its local table."}],"questions":[{"id":"d5_q_001","domain":"D5","difficulty":"medium","question":"A user logs in with a fingerprint scanner and a PIN. Which statement is correct?","options":["This is single-factor authentication because biometrics and PINs are both physical","This is multi-factor authentication because it combines Type 3 and Type 1 factors","This is multi-factor authentication because it uses two devices","This is single-factor authentication because the PIN replaces the password"],"answer":1,"explanation":"MFA requires factors from two or more DIFFERENT categories. Fingerprint = Type 3 (something you are), PIN = Type 1 (something you know). Two different categories = MFA."},{"id":"d5_q_002","domain":"D5","difficulty":"hard","question":"An organization needs to choose an access control model where Confidentiality is the highest priority. Which model should they implement?","options":["RBAC \u2014 because it separates duties most effectively","DAC \u2014 because owners can control access to confidential data","MAC \u2014 because access is determined by labels and clearances, not user discretion","ABAC \u2014 because environmental conditions add an extra layer of protection"],"answer":2,"explanation":"MAC (Mandatory Access Control) is used when Confidentiality is most important. Access is determined by labels (on objects) and clearances (on subjects), not owner discretion. Commonly used in military environments."},{"id":"d5_q_003","domain":"D5","difficulty":"medium","question":"What is the PRIMARY purpose of salting a password before hashing it?","options":["To make the hash longer and harder to crack","To defend against dictionary attacks and pre-compiled rainbow table attacks","To encrypt the password so it cannot be read by administrators","To add a second authentication factor to the login process"],"answer":1,"explanation":"A salt is random data added to a password before hashing. Its primary function is to defend against dictionary attacks and pre-compiled rainbow table attacks by making each hash unique even if passwords are identical."},{"id":"d5_q_004","domain":"D5","difficulty":"hard","question":"An employee transfers from Payroll to HR. Under RBAC, what is the CORRECT action?","options":["Add the HR role to the employee's existing Payroll role","Remove Payroll access and assign HR access only","Keep Payroll access temporarily until the transition is complete","Ask the employee which permissions they need from each role"],"answer":1,"explanation":"Under RBAC, when employees transfer, they are MOVED from one role to another \u2014 old access is removed, new access is assigned. Adding roles without removing old ones leads to privilege creep."},{"id":"d5_q_005","domain":"D5","difficulty":"medium","question":"Which of the following BEST describes a Rainbow Table attack?","options":["A brute force attack using every possible character combination","An attack using a pre-made list of plaintext passwords and their matching hashes","An attack that installs a keylogger to capture passwords in real time","An attack that guesses passwords using dictionary words with numbers appended"],"answer":1,"explanation":"A Rainbow Table is a pre-compiled list of plaintexts and their matching ciphertext/hashes \u2014 often millions of password/hash pairs. Salting defeats this attack by making each hash unique."},{"id":"d5_q_006","domain":"D5","difficulty":"hard","question":"A company's biometric system has a very high sensitivity setting. What is the MOST likely result?","options":["Higher FAR \u2014 unauthorized users are more likely to be accepted","Higher FRR \u2014 authorized users are more likely to be rejected","Lower CER \u2014 the system reaches optimal balance faster","Lower FAR \u2014 the system becomes easier to bypass"],"answer":1,"explanation":"High sensitivity = high FRR (False Rejection Rate, Type 1 error). Authorized users are rejected more often. The CER (Crossover Error Rate) is where FRR and FAR meet \u2014 the optimal balance point."},{"id":"d5_q_007","domain":"D5","difficulty":"medium","question":"What is the MAIN advantage of Kerberos over basic username/password authentication?","options":["It stores passwords in plaintext for easy recovery","It provides mutual authentication \u2014 both user and server verify each other","It uses asymmetric encryption making it immune to key theft","It eliminates the need for a centralized authentication server"],"answer":1,"explanation":"Kerberos provides mutual authentication using tickets \u2014 both the user and server verify each other's identity. It uses symmetric keys and requires a trusted third party (KDC). UDP port 88."},{"id":"d5_q_008","domain":"D5","difficulty":"hard","question":"What is the key difference between RADIUS and TACACS+?","options":["RADIUS uses TCP; TACACS+ uses UDP","RADIUS encrypts the entire data package; TACACS+ only encrypts the password","TACACS+ encrypts the entire data package; RADIUS only encrypts the password","TACACS+ is used for wireless; RADIUS is used for VPN only"],"answer":2,"explanation":"TACACS+ encrypts the ENTIRE data package. RADIUS only encrypts the password. Both provide AAA management. TACACS+ uses TCP port 49; RADIUS uses UDP 1812/1813."},{"id":"d5_q_009","domain":"D5","difficulty":"medium","question":"Which of the following is the BEST example of multi-factor authentication?","options":["Username and password","Password and security question","Smart card and PIN","Two different passwords"],"answer":2,"explanation":"Smart card = Type 2 (something you have). PIN = Type 1 (something you know). Two different factor types = MFA. Username/password, password/security question, and two passwords all use only Type 1 factors."},{"id":"d5_q_010","domain":"D5","difficulty":"hard","question":"An organization uses a centralized access control system. Which is the MOST significant disadvantage compared to a decentralized approach?","options":["All locations may have inconsistent security postures","Local admins can edit logs from their own facility","Single point of failure \u2014 if connectivity to head office is lost, authentication may fail","It is harder to enforce separation of duties centrally"],"answer":2,"explanation":"The main con of centralized access control is the dependency on connectivity to the central system. If the head office connection fails, doors/systems may be unable to authenticate. The other options are actually advantages of centralized systems."},{"id":"d5_q_011","domain":"D5","difficulty":"medium","question":"What is the PRIMARY security concern with Single Sign-On (SSO)?","options":["Users forget their single password more often","If one password is compromised, the attacker gains access to all systems the user can access","SSO requires more complex infrastructure than individual logins","SSO cannot work across different operating systems"],"answer":1,"explanation":"SSO's biggest risk: one compromised password = access to everything. This is why SSO passwords must meet strong requirements. The convenience benefit comes with significant concentration of risk."},{"id":"d5_q_012","domain":"D5","difficulty":"hard","question":"An organization needs to grant a contractor temporary access to a third-party collaboration tool without pre-creating accounts. Which technology BEST supports this?","options":["TACACS+ with dynamic provisioning","JIT (Just-In-Time) Provisioning using SAML","HOTP tokens assigned to the contractor","DAC where the contractor creates their own account"],"answer":1,"explanation":"JIT Provisioning allows users to log in to a third-party site on their first visit, where the JIT system automatically verifies the user and creates their account \u2014 most commonly using SAML. No pre-created accounts needed."},{"id":"d6_q_001","domain":"D6","difficulty":"medium","question":"What is the PRIMARY difference between a vulnerability scan and a penetration test?","options":["A vulnerability scan is performed by external parties; pen tests are always internal","A vulnerability scan identifies weaknesses; a pen test attempts to EXPLOIT those weaknesses","A pen test is automated; a vulnerability scan is always manual","A vulnerability scan tests physical security; a pen test tests logical security only"],"answer":1,"explanation":"Vulnerability scanning identifies and lists vulnerabilities (the Vulnerability in Risk = Threat \u00d7 Vulnerability). Pen testing attempts to match those vulnerabilities with actual exploits to prove real Risk. Risk = Threat \u00d7 Vulnerability."},{"id":"d6_q_002","domain":"D6","difficulty":"hard","question":"During a penetration test, the tester discovers a critical vulnerability not in the original scope. What should they do FIRST?","options":["Exploit it to demonstrate the full risk to management","Document it and report it, but do not exploit it \u2014 it is outside the SOW","Fix the vulnerability immediately to help the organization","Ignore it as it is outside scope and continue the test"],"answer":1,"explanation":"Pen testers operate strictly within the SOW. Exploiting out-of-scope systems may be illegal even if permitted. The correct action is to document and report the finding. Testers document vulnerabilities \u2014 they do NOT fix them."},{"id":"d6_q_003","domain":"D6","difficulty":"medium","question":"A SOC 2 Type II report differs from a Type I report in which MOST important way?","options":["Type II covers financial reporting; Type I covers operational controls","Type II is publicly available; Type I is confidential","Type II covers operating EFFECTIVENESS over a minimum 6-month period; Type I covers design at a single point in time","Type II is performed by internal auditors; Type I requires a third party"],"answer":2,"explanation":"SOC 2 Type I = suitability of design at a single point in time. SOC 2 Type II = suitability of design AND operating effectiveness over a minimum 6-month period. Type II is better, more expensive, and proves controls are actually working over time."},{"id":"d6_q_004","domain":"D6","difficulty":"hard","question":"An organization uses a SaaS application. During an audit, who is responsible for securing the underlying infrastructure and application?","options":["The customer \u2014 they chose the vendor and are fully responsible","The cloud provider \u2014 they manage the entire application stack in SaaS","It is split 50/50 between the provider and customer","The regulator who mandated the use of the SaaS platform"],"answer":1,"explanation":"In SaaS, the cloud provider manages and secures the entire application stack (infrastructure, platform, software). The customer is responsible for data and possibly access control. However, ultimate responsibility for data PROTECTION lies with the organization."},{"id":"d6_q_005","domain":"D6","difficulty":"medium","question":"Which type of pen test BEST simulates an attack by a malicious insider with admin access?","options":["Black Box \u2014 because insiders have no knowledge","Grey Box \u2014 because insiders have partial knowledge","White Box \u2014 because it simulates full internal knowledge and privileged access","Red Team \u2014 because it uses physical attack methods"],"answer":2,"explanation":"White Box (Crystal/Clear Box) pen testing gives the tester full internal network knowledge and access, equivalent to a privileged employee or administrator. Black Box = external attacker. Grey Box = limited user/vendor access."},{"id":"d6_q_006","domain":"D6","difficulty":"hard","question":"An attacker calls an employee claiming to be the CEO and demands urgent wire transfer of funds to avoid a lawsuit. Which social engineering technique is PRIMARILY being used?","options":["Familiarity \u2014 building a common connection with the victim","Scarcity \u2014 implying a limited time window","Urgency combined with Authority \u2014 creating time pressure while posing as a figure of authority","Consensus \u2014 implying everyone else has already complied"],"answer":2,"explanation":"This attack combines Authority (impersonating the CEO \u2014 a trusted/feared figure) and Urgency (must act now to avoid lawsuit). These two are frequently combined in whaling and vishing attacks."},{"id":"d6_q_007","domain":"D6","difficulty":"medium","question":"What is the MAIN purpose of reviewing audit logs?","options":["Preventive \u2014 to stop attacks before they happen","Detective \u2014 to identify what happened after the fact","Corrective \u2014 to fix vulnerabilities found during testing","Deterrent \u2014 to discourage attackers from targeting the system"],"answer":1,"explanation":"Reviewing audit logs is primarily a DETECTIVE control. It identifies events after they occur. NIST SP 800-92 recommends collecting network security, OS, and application logs. Centralized logging with automation is key."},{"id":"d6_q_008","domain":"D6","difficulty":"hard","question":"A company is auditing its hybrid cloud environment. Which challenge is UNIQUE to hybrid environments compared to pure cloud or pure on-premise?","options":["The shared responsibility model no longer applies","Compliance with HIPAA or PCI-DSS is not required","Maintaining a consistent security posture across both on-premise AND cloud resources simultaneously","Physical security of data centers becomes irrelevant"],"answer":2,"explanation":"Hybrid environments present unique challenges: maintaining consistent security posture across both environments, ensuring proper integration, mapping data flows, and coordinating incident response across both on-premise and cloud. This complexity is the defining challenge."},{"id":"d6_q_009","domain":"D6","difficulty":"medium","question":"A developer runs automated tools that submit random, malformed data to an application to see if it crashes. What testing technique is this?","options":["Static Testing \u2014 passively examining the source code","Dynamic Testing \u2014 actively executing the code under normal conditions","Fuzzing \u2014 submitting random malformed data to find unpredictable states or crashes","Regression Testing \u2014 checking for defects introduced by a recent code change"],"answer":2,"explanation":"Fuzzing (Fuzz Testing) submits random, malformed data as inputs to find crashes or unpredictable states. If the program crashes or hangs, the fuzz test has found a vulnerability. It is a black box testing technique."},{"id":"d6_q_010","domain":"D6","difficulty":"hard","question":"After completing a penetration test, the tester discovers sensitive PII files. According to best practices, what should they do?","options":["Copy the files to prove access and include them in the report","Access and read the files to assess the full extent of the breach","Note that they could access the target location (where a dummy file was placed) and report it \u2014 without accessing actual PII","Immediately notify the data subjects that their PII may be compromised"],"answer":2,"explanation":"Best practice places a dummy file in the same location as real PII. If the pen tester can reach the dummy file, it proves they could reach the actual data. They report this finding but do NOT access real PII, maintaining data integrity and legal compliance."},{"id":"d6_q_011","domain":"D6","difficulty":"medium","question":"What is the MOST significant risk associated with centralized audit log storage?","options":["Logs take up too much storage space","If the central log repository is compromised, an attacker can delete or modify evidence","Centralized logs cannot be read by correlation tools","Local administrators have too much access to centralized logs"],"answer":1,"explanation":"Centralized logs should be automated, secured, and even administrators should have limited access. Best practice: maintain a hashed, untouched central repository AND a separate copy for analysis. This protects log integrity."},{"id":"d6_q_012","domain":"D6","difficulty":"hard","question":"Which statement BEST describes the relationship between compliance checks and security audits?","options":["Audits are ongoing; compliance checks are point-in-time events","Compliance checks and audits serve identical purposes and can replace each other","Audits are point-in-time events; compliance checks are ongoing and should be the foundation of risk management","Compliance checks are only performed by external third parties; audits can be internal"],"answer":2,"explanation":"Security audits are point-in-time events. Compliance checks are ongoing. Compliance should be the BEGINNING of a risk management program, not the ceiling. Continuous compliance monitoring provides much more value than periodic audits alone."},{"id":"d6_q_013","domain":"D6","difficulty":"medium","question":"A client asks whether your company's controls were merely well-designed, or whether they actually held up under daily operation for the past year. Which report answers that?","options":["SOC 2 Type I","SOC 2 Type II","SOC 3","SOC 1 Type I"],"answer":1,"explanation":"Type II is the only report that evaluates OPERATING EFFECTIVENESS over a period of time (6+ months), not just design. Type I only confirms the controls were suitably designed at one moment."},{"id":"d6_q_014","domain":"D6","difficulty":"hard","question":"QA confirms the login form accepts valid credentials and rejects blank fields. A security engineer separately tries SQL injection strings and oversized payloads in the same fields. What is the security engineer doing?","options":["Interface testing","Misuse case testing","Regression testing","Installation testing"],"answer":1,"explanation":"Misuse case testing evaluates the system against ATTACKER behavior (malicious/abnormal input), not normal expected use. QA's pass/fail check of normal inputs is standard functional testing; the injection attempts are misuse case testing."},{"id":"d6_q_015","domain":"D6","difficulty":"hard","question":"A researcher finds a flaw in your product without authorization, then emails your security team giving you 90 days to patch before they publish their findings. How should this researcher be classified?","options":["Black hat","White hat","Gray hat","Script kiddie"],"answer":2,"explanation":"No authorization to test (rules out white hat) but discloses responsibly rather than exploiting maliciously (rules out black hat). That mix of unauthorized access with non-malicious, disclosure-minded intent is the gray hat profile."},{"id":"d6_q_016","domain":"D6","difficulty":"medium","question":"Which of the following is a SIGN of healthy audit log management, rather than a common organizational failure?","options":["Logs are kept only for 30 days to save storage","Logs are reviewed on a regular, timely cadence","Logs from different systems use inconsistent formats","Logs are only checked after an incident is suspected"],"answer":1,"explanation":"The other three options describe the classic failure modes (short retention, lack of standardization for SIEM correlation, and reactive-only review). Regular, timely review is the practice that should be in place, not a problem to flag."},{"id":"d6_q_017","domain":"D6","difficulty":"hard","question":"A new authentication microservice will receive a session token from the login service and pass a user-permissions object to the billing service. Testing focuses on whether that token and object survive the handoffs correctly. What is being tested?","options":["Unit testing","Component interface testing","Full system interface testing","Installation testing"],"answer":1,"explanation":"This is specifically about data passed BETWEEN two adjacent components (login service to auth service to billing service), which is component interface testing \u2014 narrower than testing every exposed interface of the whole application."},{"id":"d6_q_018","domain":"D6","difficulty":"medium","question":"At the end of a development cycle, the QA team verifies every API endpoint, every external web service call, and the user-facing UI all correctly exchange data with each other. What level of testing is this?","options":["Unit testing","Component interface testing","Interface testing","Code coverage analysis"],"answer":2,"explanation":"Testing ALL exposed interfaces of the finished application \u2014 APIs, web services, and UI integration points together \u2014 is the defining scope of interface testing, broader than the narrower component interface testing."},{"id":"d6_q_019","domain":"D6","difficulty":"medium","question":"Before committing to an expensive third-party structured audit, an organization has its own staff informally review processes and flag likely compliance gaps. What is this preliminary review called, and who performs it?","options":["A structured audit, performed by external auditors","An unstructured audit, performed by internal auditors","A SOC 2 Type I, performed by a CPA firm","A penetration test, performed by ethical hackers"],"answer":1,"explanation":"Informal, preliminary, in-house reviews done ahead of a formal audit are unstructured audits, and they're performed by internal auditors \u2014 the opposite pairing (formal/external) describes a structured audit."},{"id":"d6_q_020","domain":"D6","difficulty":"hard","question":"A penetration testing contract states the tester has been given full administrative knowledge of network diagrams, source code, and credentials. Which THREE terms could all correctly describe this engagement?","options":["Black box, zero knowledge, opaque box","Gray box, partial knowledge, translucent box","White box, clear box, crystal box","Red team, blue team, purple team"],"answer":2,"explanation":"White box, clear box, and crystal box are interchangeable terms for full-knowledge penetration testing. The other option sets describe black box (no knowledge) or gray box (partial knowledge) testing, or unrelated red/blue/purple team concepts."},{"id":"d6_q_021","domain":"D6","difficulty":"medium","question":"A tester has just finished browsing a compromised system to understand its file structure and installed software. Which of the following is a LOGICAL next step?","options":["Gaining initial access to the system","Installing additional tools for deeper analysis","Signing the original Statement of Work","Conducting the initial reconnaissance phase from scratch"],"answer":1,"explanation":"Installing additional tools (or returning to discovery) logically follows system browsing. Gaining access and reconnaissance both happen BEFORE system browsing in the typical pen test flow, so the tester wouldn't repeat those next."},{"id":"d6_q_022","domain":"D6","difficulty":"medium","question":"A single developer writes a quick test to confirm that one validation function correctly rejects an empty string input. What kind of test is this?","options":["Component interface testing","Unit testing","Interface testing","Misuse case testing"],"answer":1,"explanation":"Testing the behavior of a single function or section of code, in isolation, is the definition of unit testing \u2014 the smallest and narrowest scope of the testing types in this domain."},{"id":"d1_q_001","domain":"D1","difficulty":"hard","question":"A breach occurs on a system you administer. You had applied all patches, followed the security policy, and documented your actions. Who is MOST likely liable?","options":["You, because the system was under your control","Senior management is ultimately liable, and you likely are not liable because you demonstrated Due Care","The vendor who sold the vulnerable software","No one, because breaches are unavoidable"],"answer":1,"explanation":"Senior leadership is ULTIMATELY liable. Because you can prove Due Care (prudent-person actions: patching, following policy, documentation), you are most likely not liable. Negligence is the opposite of Due Care."},{"id":"d1_q_002","domain":"D1","difficulty":"medium","question":"An organization values protecting society and the public good above all. Which (ISC)\u00b2 Code of Ethics canon takes precedence when two canons conflict?","options":["Act honorably, honestly, justly, responsibly, and legally","Provide diligent and competent service to principals","Protect society, the common good, necessary public trust, and the infrastructure","Advance and protect the profession"],"answer":2,"explanation":"The canons are applied in ORDER of priority. Canon 1 \u2014 protect society, the common good, public trust, and infrastructure \u2014 takes precedence over the others."},{"id":"d1_q_003","domain":"D1","difficulty":"hard","question":"A laptop is worth $1,000, holds $9,000 of PII, and a theft is a total loss. The company loses 25 laptops per year. What is the ALE?","options":["$10,000","$25,000","$250,000","$225,000"],"answer":2,"explanation":"SLE = AV \u00d7 EF = $10,000 \u00d7 100% = $10,000. ALE = SLE \u00d7 ARO = $10,000 \u00d7 25 = $250,000 per year. This is the cost if you do nothing."},{"id":"d1_q_004","domain":"D1","difficulty":"medium","question":"A manager says 'we know this risk exists but we're choosing to ignore it and do nothing.' Which risk response is this, and is it acceptable?","options":["Risk Acceptance \u2014 acceptable for low risks","Risk Transference \u2014 acceptable via insurance","Risk Rejection \u2014 NEVER acceptable, the organization remains liable","Risk Avoidance \u2014 acceptable if the risk is high"],"answer":2,"explanation":"Ignoring a known risk is Risk Rejection, which is NEVER acceptable \u2014 you remain liable. Risk Acceptance (knowing the risk but mitigation costs more than the risk) is different and is acceptable for low risks."},{"id":"d1_q_005","domain":"D1","difficulty":"hard","question":"During incident handling, an investigator wants to examine a seized hard drive. What is the CORRECT approach to preserve evidence integrity?","options":["Examine the original drive directly to avoid copy errors","Make a bit-level copy, hash both original and copy, and examine only the copy","Format a backup and restore the data to a clean drive first","Boot the original drive to capture running processes"],"answer":1,"explanation":"Forensics is always done on COPIES, never originals. You hash both the original and the copy, confirm they match before and after the examination, maintaining a documented chain of custody."},{"id":"d1_q_006","domain":"D1","difficulty":"medium","question":"A company has EU customers but is based entirely in the US. A data breach occurs. How quickly must they notify under GDPR?","options":["Within 30 days","Within 72 hours","Within 24 hours","GDPR doesn't apply since they're US-based"],"answer":1,"explanation":"GDPR requires breach notification within 72 hours and applies to anyone with EU/EEA customers REGARDLESS of where the company is based. Fines can reach \u20ac20M or 4% of global turnover, whichever is greater."},{"id":"d1_q_007","domain":"D1","difficulty":"hard","question":"Which value is correct: MTD must be ___ RTO + WRT?","options":["less than","equal to","greater than or equal to","exactly half of"],"answer":2,"explanation":"MTD \u2265 RTO + WRT. The total recovery time \u2014 restoring hardware (RTO) plus configuring/recovering software (WRT) \u2014 must be less than or equal to the Maximum Tolerable Downtime."},{"id":"d1_q_008","domain":"D1","difficulty":"medium","question":"In a RACI chart, which role is described as 'ultimately answerable for correct completion' and is limited to exactly one person per task?","options":["Responsible","Accountable","Consulted","Informed"],"answer":1,"explanation":"Accountable = ultimately answerable for the correct and thorough completion of the task; there should be only ONE accountable person. Responsible does the actual work; Consulted gives input (two-way); Informed is kept updated (one-way)."},{"id":"d2_q_001","domain":"D2","difficulty":"medium","question":"A subject has a 'Secret' clearance. To access a 'Secret \u2013 Crypto' labeled document, what does the subject need BEYOND the clearance?","options":["Nothing \u2014 clearance alone grants access","Formal Access Approval and a valid Need to Know","A higher clearance level","Approval from another subject at the same level"],"answer":1,"explanation":"Beyond appropriate clearance, the subject needs Formal Access Approval (a document from the data owner) AND a valid Need to Know. Having clearance alone is never sufficient."},{"id":"d2_q_002","domain":"D2","difficulty":"hard","question":"You must securely dispose of decommissioned SSDs holding sensitive data. Which method is appropriate?","options":["Degaussing, since it works on all media","ATA Secure Erase and/or physical destruction","A single quick format","Deleting all files and emptying the recycle bin"],"answer":1,"explanation":"SSDs cannot be degaussed (no magnetic media \u2014 they're EEPROM + DRAM). Use ATA Secure Erase and/or physical destruction. Formatting and deleting leave data recoverable."},{"id":"d2_q_003","domain":"D2","difficulty":"medium","question":"Who is responsible for performing backups, restores, and patching, following the directions of the data owner?","options":["The data/information owner","The data custodian","The mission/business owner","The auditor"],"answer":1,"explanation":"The data custodian is the technical hands-on role that performs backups, restores, patches, and configuration, following the data owner's directions. The data owner assigns labels and backup frequency."},{"id":"d2_q_004","domain":"D2","difficulty":"hard","question":"Before a new system can be placed into production, the data owner must formally accept the certification and the residual risk. What is this called?","options":["Certification","Accreditation","Scoping","Tailoring"],"answer":1,"explanation":"Accreditation is the data owner's formal acceptance of the certification and residual risk \u2014 required before production. Certification is the determination that controls meet requirements."},{"id":"d3_q_001","domain":"D3","difficulty":"hard","question":"A model enforces 'No Read Up' and 'No Write Down'. What does it protect and what type is it?","options":["Integrity, using Biba","Confidentiality, using Bell-LaPadula","Availability, using Clark-Wilson","Integrity, using Clark-Wilson"],"answer":1,"explanation":"'No Read Up' (Simple Security Property) and 'No Write Down' (* Security Property) are Bell-LaPadula, which protects CONFIDENTIALITY and is a MAC model."},{"id":"d3_q_002","domain":"D3","difficulty":"hard","question":"A subject with Top Secret clearance must not read Secret-level data to avoid corruption from lower-integrity information. Which rule and model is this?","options":["No Write Up \u2014 Bell-LaPadula","No Read Down (Simple Integrity Axiom) \u2014 Biba","No Read Up \u2014 Bell-LaPadula","No Write Down \u2014 Biba"],"answer":1,"explanation":"'No Read Down' is Biba's Simple Integrity Axiom. Biba protects INTEGRITY \u2014 we don't want lower-integrity data corrupting a higher level. Biba's reads/writes are the opposite of Bell-LaPadula's."},{"id":"d3_q_003","domain":"D3","difficulty":"medium","question":"A web app encrypts data with the recipient's public key. Why can't an eavesdropper decrypt it with that same public key?","options":["Public keys can only encrypt, not decrypt; only the matching private key decrypts","The public key is hidden from attackers","The encryption uses a one-time pad","Symmetric keys are used for the actual transfer"],"answer":0,"explanation":"In asymmetric encryption, the public key encrypts and only the matching PRIVATE key (kept secret by the recipient) can decrypt. The public key being public doesn't compromise confidentiality."},{"id":"d3_q_004","domain":"D3","difficulty":"hard","question":"An attacker forges a Kerberos ticket using the krbtgt account hash, allowing them to create ANY ticket in the domain. What is this attack?","options":["Pass the Hash","Silver Ticket","Golden Ticket","ASREPRoast"],"answer":2,"explanation":"A Golden Ticket uses the hash of the krbtgt (Kerberos service) account to create any ticket within Active Directory. A Silver Ticket forges a TGS ticket from a specific service account's hash (more limited)."},{"id":"d3_q_005","domain":"D3","difficulty":"medium","question":"A digital signature provides which two security properties, and which key creates it?","options":["Confidentiality and Availability, using the public key","Integrity and Non-Repudiation, using the sender's private key","Confidentiality and Integrity, using the recipient's public key","Availability and Authentication, using a symmetric key"],"answer":1,"explanation":"A digital signature provides Integrity and Non-Repudiation. The sender hashes the message and encrypts the hash with their PRIVATE key. The recipient verifies with the sender's public key."},{"id":"d3_q_006","domain":"D3","difficulty":"hard","question":"A data center needs gas fire suppression in a room that is sometimes occupied. Why is CO2 a poor choice here?","options":["It damages electronics","It is colorless/odorless and displaces oxygen, causing people to pass out and die","It depletes the ozone layer and is banned","It leaves a corrosive residue"],"answer":1,"explanation":"CO2 is colorless and odorless, displaces oxygen, and can kill occupants \u2014 it should only be used in UNMANNED areas. (Halon was banned for ozone depletion; that's a different issue.)"},{"id":"d3_q_007","domain":"D3","difficulty":"medium","question":"On a Type 1 vs. Type 2 hypervisor question, which runs directly on the host hardware (bare metal)?","options":["Type 2, like VMware Workstation on Windows","Type 1, a virtualization OS running directly on hardware","Both run on a host OS","Neither \u2014 both require a guest OS first"],"answer":1,"explanation":"Type 1 (Bare Metal) runs directly on the host hardware as part of a virtualization OS (data center). Type 2 runs on top of a regular OS like Windows (your PC)."},{"id":"d3_q_008","domain":"D3","difficulty":"hard","question":"You need encryption for a low-power IoT device but want strength comparable to a 3,072-bit RSA key with a much shorter key. What should you use?","options":["256-bit ECC, which matches ~3,072-bit RSA strength","Single DES, which is fast","512-bit RSA","MD5 hashing"],"answer":0,"explanation":"Elliptic Curve Cryptography (ECC) is much stronger per bit \u2014 a 256-bit ECC key is roughly as strong as a 3,072-bit RSA key, making it ideal for low-power devices needing short keys."},{"id":"d4_q_001","domain":"D4","difficulty":"medium","question":"On the exam you see an unfamiliar protocol starting with 'I' and must guess its OSI layer. What's the safest answer (and the exception)?","options":["Layer 7, except for IPSEC","Layer 3, except for IMAP which is Layer 7","Layer 2, except for ICMP","Layer 4, except for IP"],"answer":1,"explanation":"Protocols starting with 'I' (IP, IGMP, IGRP, IPSEC, IKE, ISAKMP) are generally Layer 3. The exception is IMAP, which is Layer 7 (Application)."},{"id":"d4_q_002","domain":"D4","difficulty":"hard","question":"A real-time VOIP application prioritizes timing over guaranteed delivery. Which transport protocol does it use, and what attack exploits it?","options":["TCP, exploited by SYN floods","UDP, exploited by Fraggle attacks","TCP, exploited by Fraggle attacks","UDP, exploited by SYN floods"],"answer":1,"explanation":"VOIP uses UDP (connectionless, timing over delivery). A Fraggle attack works like Smurf but uses UDP instead of ICMP. SYN floods exploit TCP's 3-way handshake."},{"id":"d4_q_003","domain":"D4","difficulty":"medium","question":"DNSSEC adds which protections to DNS, and which does it NOT provide?","options":["Confidentiality and Integrity, but not Authentication","Authentication and Integrity, but NOT Confidentiality","Confidentiality only","Availability and Confidentiality"],"answer":1,"explanation":"DNSSEC provides Authentication and Integrity using PKI \u2014 like a digital signature for DNS \u2014 but does NOT provide Confidentiality. It defends against DNS poisoning."},{"id":"d4_q_004","domain":"D4","difficulty":"hard","question":"An attacker sets up an access point with the SAME SSID as the corporate network but with no security, and devices auto-connect to it. What is this attack?","options":["Rogue Access Point","Evil Twin","Jamming","War Driving"],"answer":1,"explanation":"An Evil Twin mimics the legitimate SSID (with no security) so devices connect automatically, compromising confidentiality and integrity. A rogue AP is simply an unauthorized AP added to the network."},{"id":"d4_q_005","domain":"D4","difficulty":"medium","question":"Which wireless security standard replaces the pre-shared key (PSK) with Simultaneous Authentication of Equals (SAE)?","options":["WEP","WPA","WPA2","WPA3"],"answer":3,"explanation":"WPA3 (2020) replaces the PSK exchange with SAE and uses AES-256 in GCM mode with SHA-384. WPA2 commonly uses WPA2-PSK with AES."},{"id":"d4_q_006","domain":"D4","difficulty":"hard","question":"You need a firewall that can detect malware hidden in an HTTP payload on an allowed port. Which firewall type is required?","options":["Packet filtering firewall (Layer 3)","Stateful firewall (Layer 4)","Application layer firewall / NGFW with deep packet inspection (Layer 7)","A dual-homed host"],"answer":2,"explanation":"Only an application-layer firewall or NGFW with deep packet inspection can examine the actual payload (Layer 7) to detect malicious content or protocols misusing an allowed port. Lower-layer firewalls only see headers."},{"id":"d4_q_007","domain":"D4","difficulty":"medium","question":"Which routing protocol is used to route between Autonomous Systems on the Internet and is path-vector based?","options":["RIP","OSPF","BGP","EIGRP"],"answer":2,"explanation":"BGP (Border Gateway Protocol) is the routing protocol of the Internet, routing between Autonomous Systems based on paths/policies. It's a path-vector protocol that typically never fully converges."},{"id":"d4_q_008","domain":"D4","difficulty":"hard","question":"802.1X authentication involves three parties. What is the role of the 'authenticator'?","options":["The client device requesting access","The network device (switch or wireless AP) that controls access","The RADIUS server validating credentials","The certificate authority issuing keys"],"answer":1,"explanation":"In 802.1X: the supplicant is the client device, the authenticator is the network device (switch or wireless AP), and the AS (authentication server, usually RADIUS) validates credentials."},{"id":"d4_q_009","domain":"D4","difficulty":"medium","question":"What is the key security difference between Telnet and SSH?","options":["Telnet uses TCP; SSH uses UDP","Telnet sends all data including credentials in plaintext; SSH encrypts the connection","SSH is older and less secure than Telnet","Telnet encrypts only the password"],"answer":1,"explanation":"Telnet (TCP 23) sends ALL data including usernames and passwords in plaintext and should not be used. SSH provides a secure (encrypted) connection over an unsecured network."},{"id":"d7_q_001","domain":"D7","difficulty":"medium","question":"An employee's accounts are locked and audited while they are forced to take time off, to detect any fraud they may be concealing. Which control is this?","options":["Separation of Duties","Job Rotation","Mandatory Vacations","Least Privilege"],"answer":2,"explanation":"Mandatory Vacations ensure one person isn't always performing the same task; their accounts are locked and audited while away. If they were committing and covering up fraud, the audit reveals it. Don't give too much advance notice."},{"id":"d7_q_002","domain":"D7","difficulty":"hard","question":"You must restore a system to Thursday using a Sunday full backup plus daily DIFFERENTIAL backups. How many tapes do you need?","options":["1 tape","2 tapes","4 tapes","7 tapes"],"answer":1,"explanation":"Differential backs up everything since the last FULL. So you need just 2 tapes: the Sunday full + Wednesday's differential. (Incremental would need many more \u2014 full + each day's incremental.)"},{"id":"d7_q_003","domain":"D7","difficulty":"medium","question":"Which backup type clears the archive bit and backs up only what changed since the last backup?","options":["Full backup","Differential backup","Incremental backup","Copy backup"],"answer":2,"explanation":"Incremental backs up everything changed since the last backup (full or incremental) and CLEARS the archive bit. Differential does NOT clear it. Copy is a full that doesn't clear the bit."},{"id":"d7_q_004","domain":"D7","difficulty":"hard","question":"An attack is occurring but the IDS does not detect it and takes no action. What category is this, and why is it the most dangerous?","options":["False Positive \u2014 it wastes analyst time","True Negative \u2014 normal operation","False Negative \u2014 a real attack goes completely undetected","True Positive \u2014 the system acts correctly"],"answer":2,"explanation":"A False Negative is when an attack happens but the system misses it entirely. It's the most dangerous because the threat proceeds with no alert or response."},{"id":"d7_q_005","domain":"D7","difficulty":"medium","question":"Your team is overwhelmed by SIEM alerts and wants automated response to certain incidents. Which solution adds AI-driven automatic reaction?","options":["A second SIEM","SOAR (Security Orchestration, Automation, and Response)","A network IDS","A host-based firewall"],"answer":1,"explanation":"SOAR uses AI to automatically REACT to some events, reducing the alert overload a SIEM generates. SIEM centralizes and correlates but only alerts; SOAR adds orchestrated response."},{"id":"d7_q_006","domain":"D7","difficulty":"hard","question":"After a disaster, which recovery team brings systems back at the alternate site, and in what order?","options":["Salvage team \u2014 most critical systems first","Recovery team \u2014 most critical systems first","Rescue team \u2014 least critical systems first","Recovery team \u2014 least critical systems first"],"answer":1,"explanation":"The Recovery team (failover) gets the alternate site running, bringing the MOST critical systems up first. The Salvage team (failback) returns to the primary site, bringing LEAST critical systems up first."},{"id":"d7_q_007","domain":"D7","difficulty":"medium","question":"An organization wants a recovery site with near-real-time data and the ability to switch over in under an hour, housing only critical systems. Which site type?","options":["Cold site","Warm site","Hot site","Reciprocal agreement site"],"answer":2,"explanation":"A Hot site houses critical applications with near-real-time data and allows a manual switch in about an hour or less. Warm sites restore from backups (4-24hr); cold sites have no hardware (weeks)."},{"id":"d7_q_008","domain":"D7","difficulty":"hard","question":"After eradicating an incident, you fix the same vulnerability across ALL systems org-wide, not just the compromised one. What process drives this?","options":["Lessons Learned","Root-Cause Analysis","Containment","Detection"],"answer":1,"explanation":"Root-Cause Analysis identifies the underlying weakness so you can remediate it everywhere it exists. Without it, the same problem recurs. Fixing only the one system leaves the root cause in place."},{"id":"d8_q_001","domain":"D8","difficulty":"medium","question":"On a CISSP question about the SDLC, an answer option describes the phases but never mentions 'secure' or 'security'. What should you do?","options":["Select it \u2014 security is implied","Eliminate it \u2014 for the exam, the SDLC always includes security in each phase","Select it only if it mentions testing","It depends on the methodology"],"answer":1,"explanation":"For the exam, the SDLC always has security built into each phase. If an SDLC answer omits 'secure' or 'security', it's wrong and can be eliminated."},{"id":"d8_q_002","domain":"D8","difficulty":"hard","question":"In Scrum, who is responsible for removing impediments to the team and ensuring the framework is followed, acting as a buffer rather than a traditional manager?","options":["Product Owner","Development Team","Scrum Master","Project Sponsor"],"answer":2,"explanation":"The Scrum Master facilitates, removes impediments, and ensures the Scrum framework is followed \u2014 acting as a buffer, NOT a traditional team lead or project manager. The Product Owner is the voice of the customer."},{"id":"d8_q_003","domain":"D8","difficulty":"medium","question":"A well-structured software system should have which combination of coupling and cohesion?","options":["High coupling and high cohesion","Low coupling and low cohesion","Low coupling and high cohesion","High coupling and low cohesion"],"answer":2,"explanation":"Low coupling (modules are independent) plus high cohesion (elements inside a module belong together) indicates a well-structured, readable, maintainable design."},{"id":"d8_q_004","domain":"D8","difficulty":"hard","question":"A foreign key in a child table does not match any primary key in the parent table. Which database integrity is broken?","options":["Semantic integrity","Entity integrity","Referential integrity","User-defined integrity"],"answer":2,"explanation":"Referential integrity requires every foreign key to match a primary key in the parent table. It's broken when a foreign key has no matching primary key. Entity integrity = unique non-null primary key; semantic = value matches data type."},{"id":"d8_q_005","domain":"D8","difficulty":"medium","question":"Which set of SQL statements belongs to the Data Definition Language (DDL)?","options":["SELECT, INSERT, UPDATE, DELETE","CREATE, ALTER, DROP","GRANT, REVOKE, COMMIT","BEGIN, ROLLBACK, SAVEPOINT"],"answer":1,"explanation":"DDL defines database structures: CREATE, ALTER, DROP. DML (Data Manipulation Language) works with the data itself: SELECT, INSERT, UPDATE, DELETE."},{"id":"d1_q_009","domain":"D1","difficulty":"easy","question":"During an attack, some of your data was deleted. Which leg of the CIA triad would be MOST affected?","options":["Availability \u2014 the data can no longer be accessed by authorized users","Confidentiality \u2014 unauthorized individuals may have seen the data before deletion","Integrity \u2014 the data is no longer accurate or complete","Authenticity \u2014 the origin of the data can no longer be verified"],"answer":0,"explanation":"Availability means authorized users can access data when needed. Deletion directly removes that access, making availability the primary impact. Integrity is also affected (data is incomplete), but the principal issue is that the data is simply gone and unavailable."},{"id":"d1_q_010","domain":"D1","difficulty":"medium","question":"You are the IT security manager at a large pharmaceutical company with sensitive research data and proprietary manufacturing processes. Which aspect of the CIA triad is MOST important to prioritize?","options":["Confidentiality \u2014 to prevent unauthorized access to sensitive research and proprietary processes","Integrity \u2014 to ensure research data is not altered or tampered with","Availability \u2014 to ensure authorized staff can always access the data they need","All three are equally important and must be addressed together"],"answer":0,"explanation":"In a pharmaceutical company, the primary risk is unauthorized access to proprietary research and manufacturing processes \u2014 which would cause loss of competitive advantage, regulatory breaches, and reputational damage. While integrity and availability matter, confidentiality is the dominant concern given the sensitivity of the data."},{"id":"d1_q_011","domain":"D1","difficulty":"medium","question":"With the CIA triad in mind, if an organization enforces too much confidentiality, which other principle will suffer the MOST?","options":["Availability \u2014 excessive access restrictions prevent authorized users from getting to data when needed","Integrity \u2014 heavy encryption introduces risks of data corruption or loss","Confidentiality \u2014 too many controls can undermine the confidentiality model itself","Accessibility \u2014 stricter controls reduce the overall accessibility of systems"],"answer":0,"explanation":"The CIA triad components must be balanced. When confidentiality is over-enforced \u2014 too many barriers, strict access controls, heavy encryption \u2014 authorized users struggle to access data when needed, directly reducing availability. Integrity is less directly impacted. Accessibility is not a standalone CIA triad component; it falls under availability."},{"id":"d1_q_012","domain":"D1","difficulty":"easy","question":"We often use the IAAA model in IT security. What does it do?","options":["Identifies, authenticates, and authorizes users and resources","Integrates and analyzes security data across the organization","Protects the confidentiality, integrity, and availability of data","Monitors the overall security posture of the organization"],"answer":0,"explanation":"IAAA stands for Identification, Authentication, Authorization, and Accountability. It identifies who is requesting access, authenticates that they are who they claim to be, authorizes what they can do, and maintains accountability through logging. The correct answer omits Accountability but is still the best fit. The other options describe the CIA triad or security monitoring functions, not IAAA."},{"id":"d1_q_013","domain":"D1","difficulty":"easy","question":"What is the difference between authentication and authorization?","options":["Authentication verifies identity; authorization grants access to specific resources","Authentication grants access to resources; authorization verifies identity","Both are the same process performed at different times in a session","Authentication and authorization are unrelated processes"],"answer":0,"explanation":"Authentication confirms who you are (e.g., via password or biometric). Authorization comes after, determining what the authenticated user is allowed to do. They are distinct but interdependent \u2014 authentication must succeed before authorization is applied."},{"id":"d1_q_014","domain":"D1","difficulty":"easy","question":"When authenticating against an access control system using a passphrase, which type of authentication are you using?","options":["Password authentication (something you know)","Single-factor authentication","Two-factor authentication","Multi-factor authentication"],"answer":0,"explanation":"A passphrase is a type of password \u2014 something you know. This makes it password authentication specifically. While it is also single-factor authentication, that is a broader category. The question asks for the type, so password authentication is the most precise answer. MFA and 2FA require additional factor categories beyond something you know."},{"id":"d1_q_015","domain":"D1","difficulty":"medium","question":"Which of the following is the PRIMARY indicator of good governance in an organization?","options":["Best alignment of resources with business objectives","Highest level of compliance with regulations","Least amount of risk to the organization","Most effective decision-making processes"],"answer":0,"explanation":"Good governance is primarily about aligning all resources \u2014 human, financial, technological \u2014 with the organization's strategic objectives. Compliance, risk reduction, and effective decisions all matter, but they are components of governance, not the primary indicator. An org can be fully compliant yet govern poorly if its resources don't serve its goals."},{"id":"d1_q_016","domain":"D1","difficulty":"easy","question":"Which type of security governance and management approach should an organization strive for?","options":["Proactive \u2014 anticipating threats and addressing vulnerabilities before they are exploited","Reactive \u2014 responding to threats and incidents after they occur","Compliant \u2014 focusing on meeting the minimum requirements of regulations and standards","Ad hoc \u2014 handling security issues as they arise without a structured approach"],"answer":0,"explanation":"Proactive governance means continuously assessing risk, monitoring systems, and training staff before incidents occur. Reactive approaches cost more and cause more damage. Compliance-only thinking creates a checklist mentality that misses org-specific risks. Ad hoc approaches leave gaps due to lack of structure and consistency."},{"id":"d1_q_017","domain":"D1","difficulty":"easy","question":"What is the PRIMARY function of a security management process?","options":["To assess and minimize risk to the organization","To ensure compliance with security policies and standards","To monitor and control access to information and systems","To develop and implement security controls"],"answer":0,"explanation":"The primary function of security management is risk assessment and mitigation. Compliance, access control, and implementing controls are all important \u2014 but they are tools in service of the broader goal: reducing risk to the organization's information and systems."},{"id":"d1_q_018","domain":"D1","difficulty":"hard","question":"During a court case, the defense argues that server log files are hearsay. Under what conditions can computer-generated log files be admitted as evidence despite this classification?","options":["They were generated near the time of the attack, have a clear chain of custody, and are proven unaltered via hash verification","Log files are never admissible in court under any circumstances","Only if a human witness personally observed every event recorded in the log","Automatically admissible without conditions because they are machine-generated"],"answer":0,"explanation":"Computer-generated logs are hearsay but qualify as a recognized exception if: (1) created at or near the time of the incident, (2) a documented chain of custody exists, and (3) integrity is verified by comparing hash values at collection with current values. Machine generation alone does not guarantee admissibility \u2014 broken chain of custody or altered data can render logs inadmissible."},{"id":"d1_q_019","domain":"D1","difficulty":"easy","question":"Your company's trademark application has been approved. What protection does this grant you?","options":["Protection from others using your trademark without permission","Protection only if the infringer is in the same industry","Protection only if the infringer is located in the same country","Protection only if the infringer is using it for commercial purposes"],"answer":0,"explanation":"Trademark approval grants exclusive rights to use that mark. Others cannot use the same or confusingly similar mark without permission, regardless of industry, country (international agreements like the Madrid Protocol extend protection), or whether the use is commercial. Non-commercial use can still constitute infringement if it causes confusion or dilutes a famous mark."},{"id":"d1_q_020","domain":"D1","difficulty":"medium","question":"In what order should security controls be implemented within a security framework?","options":["Most critical to least critical","Least expensive to most expensive","Most effective to least effective","Most widely used to least widely used"],"answer":0,"explanation":"Implementing controls from most critical to least critical ensures the highest-risk vulnerabilities are addressed first, protecting the most valuable assets before resources run out. Cost and effectiveness matter but should not override urgency. Popularity is irrelevant \u2014 a common control may not address your organization's specific threats."},{"id":"d1_q_021","domain":"D1","difficulty":"medium","question":"Which of the following is NOT a requirement for HIPAA compliance?","options":["Ensuring unauthorized access to health information","Encrypting electronic health records (ePHI)","Implementing appropriate physical safeguards","Providing regular security training to employees"],"answer":0,"explanation":"HIPAA requires organizations to PREVENT unauthorized access, not ensure it. The other three are genuine HIPAA requirements: the Security Rule mandates encryption of ePHI, physical safeguards (facility controls, device policies), and regular workforce training for all staff who handle protected health information."},{"id":"d1_q_022","domain":"D1","difficulty":"hard","question":"A company suffers a breach exposing 50,000 customer records, all encrypted with strong encryption. How might the encryption status affect the company's breach notification obligation?","options":["Many state breach notification laws include an encryption clause that may exempt the company from notification","Encryption has no impact on breach notification requirements under any circumstances","Encryption automatically eliminates all legal liability for the breach","The company must notify customers twice \u2014 once for the breach and once for the encryption status"],"answer":0,"explanation":"Many US state breach notification laws include an encryption safe harbor: if compromised data was adequately encrypted, the organization may not need to notify affected individuals, since strong encryption renders the data unusable to the attacker. However, encryption does not eliminate all liability \u2014 regulatory scrutiny, contractual obligations, and civil exposure may still apply."},{"id":"d1_q_023","domain":"D1","difficulty":"medium","question":"A US-based company collects personal data from customers in both the US and EU. Does GDPR apply, and if so, for which customers?","options":["GDPR applies to all customers physically located in the EU, regardless of the company's location","GDPR does not apply because the company is headquartered in the US","GDPR only applies to EU citizens, even if they live outside the EU","GDPR applies only if the company has a physical office in the EU"],"answer":0,"explanation":"GDPR coverage is based on where data subjects are located, not where the company is based. Any organization processing data of individuals physically present in the EU must comply \u2014 even with no EU office. Notably, an EU citizen living outside the EU is NOT covered; a non-EU citizen living in the EU IS covered."},{"id":"d1_q_024","domain":"D1","difficulty":"medium","question":"Which of the following is NOT one of the ISC2 Code of Ethics canons?","options":["Always protect your organization","Protect society, the common good, necessary public trust and confidence, and the infrastructure","Act honorably, honestly, justly, responsibly, and legally","Advance and protect the profession"],"answer":0,"explanation":"The four ISC2 ethics canons are: (1) Protect society, the common good, public trust, and the infrastructure; (2) Act honorably, honestly, justly, responsibly, and legally; (3) Provide diligent and competent service to principals; (4) Advance and protect the profession. Always protect your organization is not a canon \u2014 organizational loyalty is subordinate to societal and ethical obligations."},{"id":"d1_q_025","domain":"D1","difficulty":"medium","question":"When you sign the ISC2 Code of Ethics before taking the certification exam, what do you NOT promise to protect?","options":["Your personal reputation","Society and the common good","The information security profession","The interests of your principals (clients/employers)"],"answer":0,"explanation":"The ISC2 Code of Ethics commits signatories to protecting society and public trust, acting with integrity, serving principals diligently, and advancing the profession. Personal reputation is not mentioned \u2014 the code focuses on ethical obligations to others and the profession, not on protecting one's own standing."},{"id":"d1_q_026","domain":"D1","difficulty":"easy","question":"Which of the following is NOT a principle of ethical behavior in the information security industry?","options":["Profit-making","Protecting the privacy and confidentiality of personal information","Ensuring the security and integrity of information systems","Professionalism and adherence to industry standards"],"answer":0,"explanation":"Profit-making is a business goal, not an ethical principle. Ethical principles in information security include protecting privacy and confidentiality, ensuring system security and integrity, and maintaining professionalism. While financial sustainability matters to organizations, it is not an ethical principle guiding individual practitioner conduct."}]};
let mode='flash',domain='all',deck=[],idx=0,flipped=false,qAnswered=false;

const SUPABASE_URL='https://qdcfdppcaoffbkjnfvzd.supabase.co';
const SUPABASE_KEY='sb_publishable_zsx00SmyeTkShlzs-_9jjA_GUiXwBcA';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let progressCache=null;
let syncStatus='loading'; // 'loading' | 'synced' | 'offline'

function getLocalP(){try{return JSON.parse(localStorage.getItem('cp')||'{}')}catch(e){return{}}}
function saveLocalP(p){try{localStorage.setItem('cp',JSON.stringify(p))}catch(e){}}
function getPendingIds(){try{return JSON.parse(localStorage.getItem('cp_pending')||'[]')}catch(e){return[]}}
function savePendingIds(ids){try{localStorage.setItem('cp_pending',JSON.stringify(ids))}catch(e){}}
function addPending(id){const ids=getPendingIds();if(!ids.includes(id)){ids.push(id);savePendingIds(ids);}}
function clearPending(id){savePendingIds(getPendingIds().filter(x=>x!==id));}

async function loadProgress(){
  const local=getLocalP();
  const localActions=getLocalActions();
  const pending=getPendingIds();
  try{
    const {data,error}=await sb.from('progress').select('card_id,score,last_action');
    if(error)throw error;
    const remote={};
    const remoteActions={};
    data.forEach(row=>{remote[row.card_id]=row.score;if(row.last_action)remoteActions[row.card_id]=row.last_action;});
    // Merge: remote is authoritative EXCEPT for cards with a pending (unconfirmed) local write
    const merged={...remote};
    const mergedActions={...remoteActions};
    pending.forEach(id=>{
      if(local[id]!==undefined) merged[id]=local[id];
      if(localActions[id]!==undefined) mergedActions[id]=localActions[id];
    });
    progressCache=merged;
    syncStatus=pending.length?'offline':'synced';
    saveLocalP(merged);
    saveLocalActions(mergedActions);
  }catch(e){
    progressCache=local;
    syncStatus='offline';
  }
  updSyncBadge();
  await loadStudyTime();
  // stats are computed live from last_action, no separate load needed
  startTimer();
  reset();
  retryPendingSyncs();
}

function getP(){return progressCache||getLocalP();}

function saveP(p){
  progressCache=p;
  saveLocalP(p); // always mirror locally, instant + offline-safe
}

function getLocalActions(){try{return JSON.parse(localStorage.getItem('cp_actions')||'{}')}catch(e){return{}}}
function saveLocalActions(a){try{localStorage.setItem('cp_actions',JSON.stringify(a))}catch(e){}}
function setLastAction(cardId,action){
  const a=getLocalActions();a[cardId]=action;saveLocalActions(a);
}

async function syncCard(cardId,score,lastAction){
  addPending(cardId);
  setLastAction(cardId,lastAction);
  try{
    const {error}=await sb.from('progress').upsert({card_id:cardId,score:score,last_action:lastAction,updated_at:new Date().toISOString()});
    if(error)throw error;
    clearPending(cardId);
    syncStatus=getPendingIds().length?'offline':'synced';
  }catch(e){
    syncStatus='offline';
  }
  updSyncBadge();
}

async function retryPendingSyncs(){
  const ids=getPendingIds();
  if(!ids.length)return;
  const p=getP();
  const actions=getLocalActions();
  for(const id of ids){
    if(p[id]!==undefined) await syncCard(id,p[id],actions[id]);
  }
}

function updSyncBadge(){
  const el=document.getElementById('syncBadge');
  if(!el)return;
  if(syncStatus==='synced'){el.textContent='● synced';el.style.color='var(--correct)';}
  else if(syncStatus==='offline'){el.textContent='● offline (saved locally)';el.style.color='var(--wrong)';}
  else{el.textContent='● syncing…';el.style.color='var(--muted)';}
}

// ---- Persistent Got/Again counters ----
function computeStats(){
  const actions=getLocalActions();
  let got=0,again=0;
  Object.values(actions).forEach(a=>{ if(a==='got')got++; else if(a==='again')again++; });
  return {got,again};
}

// ---- Study time tracking ----
let totalSeconds=0;       // last known synced/local total, NOT including current running tick
let pendingSeconds=0;     // seconds accumulated this active stretch, not yet flushed
let timerInterval=null;
const FLUSH_EVERY_SEC=30; // push to Supabase this often

function getLocalTime(){try{return parseInt(localStorage.getItem('studySeconds')||'0',10)}catch(e){return 0}}
function saveLocalTime(s){try{localStorage.setItem('studySeconds',String(s))}catch(e){}}

async function loadStudyTime(){
  try{
    const {data,error}=await sb.from('study_time').select('total_seconds').eq('id','total').single();
    if(error)throw error;
    totalSeconds=data.total_seconds;
    saveLocalTime(totalSeconds);
  }catch(e){
    totalSeconds=getLocalTime();
  }
  renderTime();
}

function renderTime(){
  const el=document.getElementById('totalTimeLabel');
  if(!el)return;
  const grand=totalSeconds+pendingSeconds;
  const h=Math.floor(grand/3600);
  const m=Math.floor((grand%3600)/60);
  el.textContent=h+'h '+m+'m';
}

function startTimer(){
  if(timerInterval)return;
  timerInterval=setInterval(()=>{
    if(document.visibilityState!=='visible')return; // only count active foreground time
    pendingSeconds++;
    renderTime();
    if(pendingSeconds>=FLUSH_EVERY_SEC)flushTime();
  },1000);
}

async function flushTime(){
  if(pendingSeconds<=0)return;
  const toFlush=pendingSeconds;
  pendingSeconds=0;
  const newTotal=totalSeconds+toFlush;
  totalSeconds=newTotal;
  saveLocalTime(newTotal);
  renderTime();
  try{
    const {error}=await sb.from('study_time').upsert({id:'total',total_seconds:newTotal,updated_at:new Date().toISOString()});
    if(error)throw error;
  }catch(e){
    // offline: local total already updated above, will retry next flush/visit
  }
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden')flushTime();
});
window.addEventListener('beforeunload',()=>{
  saveLocalTime(totalSeconds+pendingSeconds); // best-effort local save; network flush may not complete in time
});

function buildDeck(){
  const src=mode==='flash'?DATA.flashcards:DATA.questions;
  const filtered=domain==='all'?src:src.filter(c=>c.domain===domain);
  const prog=getP();
  let w=[];
  filtered.forEach(c=>{
    const score=prog[c.id]||0;
    const dr={'D1':3,'D2':1,'D3':2,'D4':3,'D5':2,'D6':3,'D7':1,'D8':1}[c.domain]||1;
    const br=score<0?2:score===0?1:0;
    for(let i=0;i<dr+br;i++)w.push(c);
  });
  for(let i=w.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[w[i],w[j]]=[w[j],w[i]];}
  return w;
}

function switchMode(m){
  mode=m;
  reviewMode=false;
  jumpedFromReview=false;
  document.getElementById('tabFlash').className='tab'+(m==='flash'?' active':'');
  document.getElementById('tabQuiz').className='tab'+(m==='quiz'?' active':'');
  reset();
}

function setDomain(d){
  domain=d;
  reviewMode=false;
  jumpedFromReview=false;
  ['filterAll','filterD1','filterD2','filterD3','filterD4','filterD5','filterD6','filterD7','filterD8'].forEach(id=>document.getElementById(id).className='filter-btn');
  const b=document.getElementById('navBadge');
  if(d==='all'){document.getElementById('filterAll').className='filter-btn active-all';b.className='nav-badge badge-all';b.textContent='All Domains';}
  else{document.getElementById('filter'+d).className='filter-btn active-'+d.toLowerCase();b.className='nav-badge badge-'+d.toLowerCase();b.textContent=d;}
  reset();
